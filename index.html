<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iamasx — Blog</title>
  <link rel="stylesheet" href="assets/css/shared.css">
  <style>
    .site-header {
      padding: 72px 0 48px;
    }

    .site-header .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .site-header .eyebrow .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .site-header h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 10px;
    }

    .site-header .sub {
      font-size: 17px;
      color: var(--ink-dim);
      line-height: 1.5;
    }

    /* ── Blog grid ── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
    }

    .blog-card {
      display: block;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px 32px;
      transition: border-color 0.2s, transform 0.2s;
      color: inherit;
    }

    .blog-card:hover {
      border-color: var(--line-2);
      transform: translateY(-2px);
    }

    .blog-card .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      line-height: 1.3;
      transition: color 0.15s;
    }

    .blog-card:hover .card-title { color: var(--accent); }

    .blog-card .card-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }

    .blog-card .card-desc {
      font-size: 14px;
      color: var(--ink-dim);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .blog-card .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(125, 211, 252, 0.10);
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--ink-faint);
      font-size: 15px;
    }

    @media (max-width: 560px) {
      .blog-grid { grid-template-columns: 1fr; }
      .site-header { padding: 48px 0 32px; }
      .site-header h1 { font-size: 32px; }
      .blog-card { padding: 22px 20px; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="wrap">
      <a href="./" class="site-name">iamasx</a>
    </div>
  </nav>

  <div class="wrap">
    <header class="site-header">
      <div class="eyebrow"><span class="dot"></span>Blog</div>
      <h1>Writing</h1>
      <p class="sub">Engineering notes, deep dives, and change logs.</p>
    </header>

    <div id="blog-list" class="blog-grid"></div>

    <noscript>
      <div class="empty-state">
        <p>This page requires JavaScript to list blog posts.</p>
      </div>
    </noscript>
  </div>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; 2025 iamasx</p>
    </div>
  </footer>

  <script src="assets/js/blogs.js"></script>
  <script>
    (function () {
      var posts = window.BLOG_POSTS || [];
      var container = document.getElementById('blog-list');

      posts.sort(function (a, b) {
        return new Date(b.date) - new Date(a.date);
      });

      if (posts.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No posts yet.</p></div>';
        return;
      }

      function formatDate(dateStr) {
        var d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      posts.forEach(function (post) {
        var card = document.createElement('a');
        card.href = 'posts/' + post.slug + '/';
        card.className = 'blog-card';

        var tagsHtml = '';
        if (post.tags && post.tags.length) {
          tagsHtml = '<div class="card-tags">' +
            post.tags.map(function (t) { return '<span class="tag">' + t + '</span>'; }).join('') +
            '</div>';
        }

        card.innerHTML =
          '<div class="card-title">' + post.title + '</div>' +
          '<div class="card-meta">' +
            '<span>' + formatDate(post.date) + '</span>' +
            '<span>' + post.readingTime + ' read</span>' +
          '</div>' +
          '<div class="card-desc">' + post.description + '</div>' +
          tagsHtml;

        container.appendChild(card);
      });
    })();
  </script>
</body>
</html>
