      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);

      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);

    // Parse the template and swap the root element. Scripts inserted via

    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

    // which fired before we swapped the document. Trigger manually if present.

    }

er-radius: 6px;\n    font-size: 14px;\n    color: var(--ink);\n  }\n  pre.code-block {\n    font-family: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, Consolas, monospace;\n    font-size: 13px;\n    line-height: 1.6;\n    color: var(--ink-dim);\n    background: rgba(0,0,0,0.3);\n    border: 1px solid var(--line);\n    border-radius: var(--radius-sm);\n    padding: 14px 18px;\n    margin: 10px 0;\n    overflow-x: auto;\n    white-space: pre;\n  }\n  pre.code-block .c-kw { color: #c586c0; }\n  pre.code-block .c-fn { color: #7dd3fc; }\n  pre.code-block .c-num { color: #fcd34d; }\n  ul.primer-refs {\n    margin: 10px 0; padding-left: 22px;\n    list-style: none;\n  }\n  ul.primer-refs li {\n    padding: 5px 0 5px 16px;\n    position: relative;\n    font-size: 14px;\n  }\n  ul.primer-refs li::before {\n    content: \"↗\"; position: absolute; left: 0;\n    color: var(--accent); font-size: 12px;\n  }\n  ul.primer-refs a {\n    color: var(--accent); text-decoration: none;\n    border-bottom: 1px dotted rgba(125,211,252,0.4);\n  }\n  ul.primer-refs a:hover { border-bottom-color: var(--accent); }\n  @media (max-width: 700px) {\n    details.primer summary { padding: 14px 16px; }\n    .primer-body { padding: 6px 18px 20px; font-size: 14px; }\n    pre.code-block { font-size: 12px; padding: 12px; }\n    .primer-badge { font-size: 10px; padding: 3px 8px; }\n  }\n\n  /* -------- Compact data tables (metrics + cache TTL reference) -------- */\n  .data-table {\n    width: 100%; border-collapse: separate; border-spacing: 0;\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); overflow: hidden;\n    font-size: 14px; margin: 0;\n  }\n  .data-table th, .data-table td {\n    padding: 10px 16px; text-align: left;\n    border-bottom: 1px solid var(--line);\n    vertical-align: top;\n  }\n  .data-table tr:last-child td { border-bottom: 0; }\n  .data-table th {\n    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--ink-faint); font-weight: 600; background: var(--bg-2);\n  }\n  .data-table td { color: var(--ink-dim); }\n  .data-table td:first-child { color: #fff; }\n  .data-table td.ttl {\n    font-family: ui-monospace, monospace; color: var(--accent); white-space: nowrap;\n  }\n  .data-table td.num {\n    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;\n    font-variant-numeric: tabular-nums;\n    white-space: nowrap;\n  }\n  .data-table td.num.before { color: var(--bad); }\n  .data-table td.num.after  { color: var(--good); }\n  .data-table td.num.delta  { color: var(--accent); font-weight: 500; }\n  .data-table td.num.delta.up { color: var(--good); }\n  .data-table td.num.dim    { color: var(--ink-faint); font-size: 13px; }\n  @media (max-width: 700px) {\n    .data-table th, .data-table td { padding: 8px 10px; font-size: 13px; }\n  }\n\n  /* -------- Poll architecture tree -------- */\n  .poll-arch {\n    margin-top: 16px;\n    background: var(--panel);\n    border: 1px solid var(--line);\n    border-radius: var(--radius);\n    padding: 26px 30px;\n    overflow: hidden;\n  }\n  .poll-arch-head { margin-bottom: 16px; }\n  .poll-arch-head h4 {\n    margin: 0 0 4px; font-size: 17px; font-weight: 600; color: #fff;\n    letter-spacing: -0.005em;\n  }\n  .poll-arch-sub {\n    color: var(--ink-faint); font-size: 12.5px;\n    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;\n    letter-spacing: 0;\n  }\n  .poll-arch-tree {\n    font-family: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, Consolas, monospace;\n    font-size: 12.5px;\n    line-height: 1.85;\n    color: var(--ink-dim);\n    background: rgba(0,0,0,0.25);\n    border: 1px solid var(--line);\n    border-radius: var(--radius-sm);\n    padding: 18px 20px;\n    margin: 0;\n    overflow-x: auto;\n    white-space: pre;\n    tab-size: 2;\n  }\n  .poll-arch-tree .pa-phase { color: #fff; font-weight: 600; }\n  .poll-arch-tree .pa-fn { color: var(--accent); }\n  .poll-arch-tree .pa-comment { color: var(--ink-faint); font-style: italic; }\n  .poll-arch-tree .pa-count { color: #fcd34d; font-weight: 500; }\n  .poll-arch-tree .pa-count.zero { color: var(--good); opacity: 0.85; }\n  .poll-arch-tree .pa-note { color: var(--ink-faint); }\n  .poll-arch-tree .pa-total {\n    color: #fff; font-weight: 600;\n    background: rgba(125,211,252,0.1);\n    border: 1px solid rgba(125,211,252,0.25);\n    padding: 5px 12px; border-radius: 6px;\n    display: inline-block; margin-top: 6px;\n  }\n  @media (max-width: 820px) {\n    .poll-arch-tree { font-size: 11.5px; padding: 14px; }\n    .poll-arch { padding: 20px; }\n  }\n\n  /* -------- Summary -------- */\n  .summary {\n    border-left: 2px solid var(--accent);\n    padding: 4px 0 4px 24px;\n    color: var(--ink);\n    font-size: 16px;\n    line-height: 1.75;\n  }\n\n  /* -------- Step cards -------- */\n  .steps { display: grid; gap: 14px; counter-reset: step; }\n  .step {\n    display: grid; grid-template-columns: 56px 1fr; gap: 22px;\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); padding: 22px 26px;\n    transition: border-color 0.15s;\n  }\n  .step:hover { border-color: var(--line-2); }\n  .step .badge {\n    counter-increment: step;\n    width: 40px; height: 40px; border-radius: 10px;\n    display: grid; place-items: center;\n    background: var(--panel-2);\n    border: 1px solid var(--line-2);\n    color: var(--accent);\n    font-family: ui-monospace, monospace;\n    font-size: 15px; font-weight: 500;\n  }\n  .step .badge::before { content: counter(step, decimal-leading-zero); }\n  .step h4 { margin: 4px 0 6px; font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.005em; }\n  .step p { margin: 0; color: var(--ink-dim); font-size: 14.5px; line-height: 1.65; }\n\n  /* Tradeoffs variant — warning tint */\n  .steps.trade .step .badge { color: var(--warn); }\n  .steps.future .step .badge { color: var(--good); }\n\n  /* -------- Caches cards -------- */\n  .cache-grid { display: grid; gap: 14px; }\n  .cache-card {\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); padding: 24px 28px;\n  }\n  .cache-card h4 {\n    margin: 0 0 10px; font-size: 17px; font-weight: 600; color: #fff;\n    display: flex; gap: 12px; align-items: baseline;\n  }\n  .cache-card h4 .n {\n    font-family: ui-monospace, monospace; color: var(--accent);\n    font-size: 13px; font-weight: 500;\n  }\n  .cache-card p { color: var(--ink-dim); font-size: 14.5px; line-height: 1.7; margin: 0; }\n  .cache-card p + p { margin-top: 10px; }\n\n  /* -------- Reference tables -------- */\n\n  .ref-title {\n    display: flex; align-items: center; gap: 14px;\n    margin: 0 0 8px;\n  }\n  .ref-title h4 { margin: 0; font-size: 17px; font-weight: 600; color: #fff; }\n  .ref-title .hint { color: var(--ink-faint); font-size: 13px; }\n  .ref-block + .ref-block { margin-top: 28px; }\n  .ref-sub { color: var(--ink-dim); font-size: 13.5px; margin: 0 0 14px; }\n\n  /* -------- Collapsible changelog -------- */\n  .track {\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); overflow: hidden;\n  }\n  .track + .track { margin-top: 12px; }\n  .track summary {\n    list-style: none; cursor: pointer;\n    padding: 20px 26px;\n    display: flex; justify-content: space-between; align-items: center;\n    gap: 20px;\n    transition: background 0.15s;\n  }\n  .track summary::-webkit-details-marker { display: none; }\n  .track summary:hover { background: var(--panel-2); }\n  .track[open] summary { border-bottom: 1px solid var(--line); }\n\n  .track .t-left { display: flex; align-items: center; gap: 16px; min-width: 0; }\n  .track .letter {\n    width: 36px; height: 36px; border-radius: 8px;\n    display: grid; place-items: center;\n    background: rgba(125,211,252,0.08);\n    border: 1px solid rgba(125,211,252,0.2);\n    color: var(--accent);\n    font-family: ui-monospace, monospace; font-size: 15px; font-weight: 600;\n  }\n  .track .t-title { font-size: 16px; font-weight: 600; color: #fff; }\n  .track .t-date { font-family: ui-monospace, monospace; font-size: 12px; color: var(--ink-faint); margin-top: 2px; }\n  .track .caret {\n    width: 12px; height: 12px; border-right: 2px solid var(--ink-faint);\n    border-bottom: 2px solid var(--ink-faint); transform: rotate(45deg);\n    transition: transform 0.15s;\n    flex-shrink: 0;\n  }\n  .track[open] .caret { transform: rotate(-135deg); }\n\n  .track .body { padding: 8px 26px 26px; }\n  .track .body ol {\n    list-style: none; padding: 0; margin: 0; counter-reset: tstep;\n  }\n  .track .body ol > li {\n    counter-increment: tstep;\n    padding: 16px 0 16px 44px;\n    position: relative;\n    border-top: 1px solid var(--line);\n    color: var(--ink-dim);\n    font-size: 14.5px;\n    line-height: 1.65;\n  }\n  .track .body ol > li::before {\n    content: counter(tstep, decimal-leading-zero);\n    position: absolute; left: 0; top: 16px;\n    font-family: ui-monospace, monospace;\n    color: var(--ink-faint); font-size: 12px;\n    letter-spacing: 0.05em;\n  }\n  .track .body ol > li strong { color: #fff; }\n  .track .body ul.sub {\n    margin: 10px 0 0; padding: 0 0 0 18px;\n    list-style: none;\n  }\n  .track .body ul.sub li {\n    padding: 6px 0 6px 16px;\n    position: relative;\n    color: var(--ink-dim);\n    font-size: 14px;\n  }\n  .track .body ul.sub li::before {\n    content: \"\"; position: absolute; left: 0; top: 16px;\n    width: 8px; height: 1px; background: var(--line-2);\n  }\n  .track .body .result {\n    margin-top: 8px; padding: 10px 14px;\n    background: rgba(34,197,94,0.06);\n    border: 1px solid rgba(34,197,94,0.15);\n    border-left: 3px solid var(--good);\n    border-radius: 6px;\n    font-size: 13.5px; color: #bbf7d0;\n  }\n\n  /* -------- Footer divider between sections -------- */\n  .rule {\n    height: 1px; background: var(--line); margin: 56px 0;\n  }\n\n  /* -------- Responsive -------- */\n  @media (max-width: 820px) {\n    .wrap { padding: 32px 20px 60px; }\n    h1 { font-size: 32px; }\n  }\n  @media print {\n    body { background: #fff; color: #000; }\n    .track .body { display: block !important; }\n    details[open] { page-break-inside: avoid; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <header class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Engineering · Findings report · PR #1238<\u002Fdiv>\n    <h1>GitHub API Rate Limiting — Complete Change Log<\u002Fh1>\n    <p class=\"sub\">How AO's GitHub API consumption was traced, diagnosed, and reduced — taking the practical ceiling from ~12 concurrent sessions to ~41 on a single PAT.<\u002Fp>\n    <div class=\"meta-row\">\n      <span><b>Scope:<\u002Fb> <code class=\"mono\">scm-github<\u002Fcode> · <code class=\"mono\">tracker-github<\u002Fcode> · <code class=\"mono\">~/.ao/bin/gh<\u002Fcode><\u002Fspan>\n      <span><b>Window:<\u002Fb> Apr 14 – Apr 25<\u002Fspan>\n      <span><b>Tracks:<\u002Fb> A – H<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ PROBLEM ============ -->\n  <section>\n    <h2>The Problem<\u002Fh2>\n\n    <div class=\"alert\">\n      <div class=\"tag\">Blocking issue<\u002Fdiv>\n      <p class=\"big\">AO was burning through GitHub's API rate limits too fast, making it impossible to run many concurrent sessions.<\u002Fp>\n      <div class=\"quota-row\">\n        <div class=\"quota\"><div class=\"k\">GitHub budget / PAT<\u002Fdiv><div class=\"v\">5,000 <span style=\"color:var(--ink-faint);font-size:14px;\">REST / hr<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"quota\"><div class=\"k\">GraphQL points / PAT<\u002Fdiv><div class=\"v\">5,000 <span style=\"color:var(--ink-faint);font-size:14px;\">pts / hr<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"quota\"><div class=\"k\">Target<\u002Fdiv><div class=\"v\">50+ <span style=\"color:var(--ink-faint);font-size:14px;\">concurrent sessions<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n\n    <details class=\"primer\">\n      <summary>\n        <div class=\"primer-left\">\n          <div class=\"primer-badge\">Primer<\u002Fdiv>\n          <div>\n            <div class=\"primer-title\">REST vs GraphQL on GitHub — When to Use Which<\u002Fdiv>\n            <div class=\"primer-sub\">Background reading · budgets, cost calculation, the hybrid pattern, and when each API wins.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"primer-body\">\n\n        <h4 class=\"primer-h\">The two budgets are separate<\u002Fh4>\n        <p>GitHub operates two independent rate-limit pools per personal access token:<\u002Fp>\n        <table class=\"data-table\">\n          <thead>\n            <tr>\n              <th style=\"width: 22%;\">API<\u002Fth>\n              <th style=\"width: 18%;\">Unit<\u002Fth>\n              <th style=\"width: 30%;\">Limit (PAT)<\u002Fth>\n              <th style=\"width: 30%;\">Limit (GHEC App)<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td>REST<\u002Ftd><td>Requests<\u002Ftd><td>5,000 / hr<\u002Ftd><td>15,000 / hr<\u002Ftd><\u002Ftr>\n            <tr><td>GraphQL<\u002Ftd><td>Points<\u002Ftd><td>5,000 / hr<\u002Ftd><td>10,000 / hr<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p>They do <strong>not<\u002Fstrong> share a bucket. A well-designed integration can draw from both in parallel and effectively double its headroom. What <em>is<\u002Fem> shared: a <strong>100 concurrent-request cap<\u002Fstrong> across both APIs, plus per-minute secondary limits (900 pts/min REST, 2,000 pts/min GraphQL), and a CPU-time ceiling of 90 seconds per 60 real-time seconds.<\u002Fp>\n\n        <h4 class=\"primer-h\">How each request is charged<\u002Fh4>\n        <p><strong>REST is simple: one call = one unit.<\u002Fstrong> A <code>GET /repos/{owner}/{repo}/pulls/{number}<\u002Fcode> costs exactly 1 request regardless of response size. Paginating a 1,000-item list at 100-per-page costs 10 requests.<\u002Fp>\n        <p><strong>GraphQL charges by estimated work, not count.<\u002Fstrong> Each query costs <strong>at least 1 point<\u002Fstrong>, but the real cost scales with how many nodes the query could potentially touch. GitHub's formula:<\u002Fp>\n        <ol class=\"primer-list\">\n          <li>For each connection in the query, multiply out the <code>first:<\u002Fcode> / <code>last:<\u002Fcode> arguments along its ancestor chain (assume every call hits the limit).<\u002Fli>\n          <li>Sum across all connections.<\u002Fli>\n          <li>Divide the total by 100 and round up.<\u002Fli>\n        <\u002Fol>\n        <p>So a query asking for 50 repos × 20 PRs × 10 comments each pulls ~10,000 nodes through the PR-comments branch alone. Add sibling connections (issues, followers, etc.) and you're at ~22,000 nodes — which rolls up to <strong>~220 points<\u002Fstrong> on a single call. Meanwhile <code>{ viewer { login } }<\u002Fcode> costs 1 point.<\u002Fp>\n        <p>You can check cost before paying it by including <code>rateLimit { cost remaining resetAt }<\u002Fcode> in the query itself — querying that field doesn't count against the limit.<\u002Fp>\n\n        <h4 class=\"primer-h\">When to prefer REST<\u002Fh4>\n        <ul class=\"primer-list\">\n          <li><strong>Fetching a single resource by ID.<\u002Fstrong> <code>GET /issues/123<\u002Fcode> is 1 request; the equivalent GraphQL query is also 1 point. No benefit from GraphQL, and REST is simpler to cache and debug.<\u002Fli>\n          <li><strong>Paginating a flat, homogeneous list.<\u002Fstrong> 10 REST calls for 1,000 items is cleaner than squeezing it through one complex GraphQL query — and REST gives you HTTP-layer caching, CDN compatibility, and trivial parallelization.<\u002Fli>\n          <li><strong>You need conditional requests (ETags).<\u002Fstrong> This is REST's killer feature and the single biggest lever in this project. <code>If-None-Match<\u002Fcode> returns a 304 Not Modified that <strong>does not count against the rate limit<\u002Fstrong> for the resource body. GraphQL does not support this. An ETag check returning 304 is effectively free.<\u002Fli>\n          <li><strong>You need partial-failure tolerance.<\u002Fstrong> 100 parallel REST calls: if 3 fail, you have 97 results. One GraphQL batch: a single bad sub-resolver gives you a partial response with <code>errors[]<\u002Fcode> you have to reconcile.<\u002Fli>\n          <li><strong>The endpoint exposes REST-only functionality.<\u002Fstrong> Raw file downloads, tarballs, Actions artifacts don't have GraphQL equivalents.<\u002Fli>\n        <\u002Ful>\n\n        <h4 class=\"primer-h\">When to prefer GraphQL<\u002Fh4>\n        <ul class=\"primer-list\">\n          <li><strong>Fetching related data across multiple entities in one shot.<\u002Fstrong> \"For each of 20 PRs, give me the state, last 5 checks, review decision, and merge-readiness.\" In REST that's 80+ calls. In GraphQL it's one query at ~20 points.<\u002Fli>\n          <li><strong>Over-fetching in REST is hurting you.<\u002Fstrong> REST <code>GET /pulls/{n}<\u002Fcode> returns 40+ fields; GraphQL lets you request exactly 4. Matters more for payload size than rate limit, but compounds on polling workloads.<\u002Fli>\n          <li><strong>You need heterogeneous shape per client.<\u002Fstrong> Dashboard needs fields A/B/C, detail view needs B/D/E. Either design 47 REST endpoints or use one GraphQL endpoint.<\u002Fli>\n          <li><strong>You're already paying N × REST calls for one logical operation.<\u002Fstrong> If you're about to write a client-side loop or batcher over REST, you probably want GraphQL.<\u002Fli>\n        <\u002Ful>\n\n        <h4 class=\"primer-h\">The hybrid pattern: REST gating GraphQL<\u002Fh4>\n        <p>This is what ended up working best in this project. The two APIs answer different questions efficiently:<\u002Fp>\n        <ul class=\"primer-list\">\n          <li><strong>REST is excellent at \"did anything change?\"<\u002Fstrong> via conditional requests.<\u002Fli>\n          <li><strong>GraphQL is excellent at \"give me everything related to X\"<\u002Fstrong> via connections.<\u002Fli>\n        <\u002Ful>\n        <p>A cheap REST ETag check in front of an expensive GraphQL batch gives you the best of both: when nothing has changed (the common case in polling), you pay ~1 REST request for a 304 and skip the GraphQL call entirely. <strong>Guard 1<\u002Fstrong> in this system returns 304 on ~88% of poll cycles, meaning we pay ~12% of the full-batch cost on average. <strong>Guard 3<\u002Fstrong> hits 304 on ~95% of review-thread checks, so the <code>reviewThreads + reviews<\u002Fcode> query (2 points) is skipped on nearly every cycle.<\u002Fp>\n        <div class=\"primer-callout\">\n          A 304 costs 1 REST request but saves potentially 20–100+ GraphQL points. Cross-bucket arbitrage — spending from the cheap side of the ledger to protect the expensive side.\n        <\u002Fdiv>\n\n        <h4 class=\"primer-h\">Worked cost example (from this project)<\u002Fh4>\n        <p>Our review-threads query after Track G:<\u002Fp>\n        <pre class=\"code-block\"><span class=\"c-kw\">query<\u002Fspan> {\n  <span class=\"c-fn\">repository<\u002Fspan>(owner: $owner, name: $name) {\n    <span class=\"c-fn\">pullRequest<\u002Fspan>(number: $num) {\n      <span class=\"c-fn\">reviewThreads<\u002Fspan>(last: <span class=\"c-num\">100<\u002Fspan>) { ... }\n      <span class=\"c-fn\">reviews<\u002Fspan>(last: <span class=\"c-num\">5<\u002Fspan>) { ... }\n    }\n  }\n}<\u002Fpre>\n        <p>Cost calculation:<\u002Fp>\n        <ul class=\"primer-list\">\n          <li><code>reviewThreads(last: 100)<\u002Fcode> → 100 nodes<\u002Fli>\n          <li><code>reviews(last: 5)<\u002Fcode> → 5 nodes<\u002Fli>\n          <li>Total: 105 nodes → <code>ceil(105 / 100)<\u002Fcode> = <strong>2 points<\u002Fstrong><\u002Fli>\n        <\u002Ful>\n        <p>Before adding <code>reviews(last: 5)<\u002Fcode>, the same query cost 1 point. Adding one sibling connection doubled the cost. But because Guard 3 skips the call on ~95% of cycles, the <strong>amortized<\u002Fstrong> cost dropped, not rose. Query cost and call frequency have to be reasoned about together, not in isolation.<\u002Fp>\n\n        <h4 class=\"primer-h\">Common mistakes worth avoiding<\u002Fh4>\n        <ul class=\"primer-list\">\n          <li><strong>Using GraphQL for single-entity fetches just because GraphQL is \"newer.\"<\u002Fstrong> No benefit; you lose HTTP caching.<\u002Fli>\n          <li><strong>Ignoring query complexity.<\u002Fstrong> One poorly-written nested query can cost more than a hundred REST calls.<\u002Fli>\n          <li><strong>Not using ETags on REST.<\u002Fstrong> Most GitHub REST endpoints support <code>If-None-Match<\u002Fcode>. A 304 is nearly free and eliminates the need for client-side freshness timers.<\u002Fli>\n          <li><strong>Writing a DataLoader over REST.<\u002Fstrong> If you're deduping/batching REST calls in application code, GraphQL probably already solves your problem.<\u002Fli>\n          <li><strong>Assuming rate-limit budgets are shared.<\u002Fstrong> They aren't — splitting work across both APIs is a legitimate scaling strategy.<\u002Fli>\n          <li><strong>Forgetting the 100-concurrent cap.<\u002Fstrong> This one <em>is<\u002Fem> shared. Parallelizing aggressively across both APIs can trip the secondary limit even when primary budgets are fine.<\u002Fli>\n        <\u002Ful>\n\n        <h4 class=\"primer-h\">References (GitHub docs)<\u002Fh4>\n        <ul class=\"primer-refs\">\n          <li><a href=\"https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api\" target=\"_blank\" rel=\"noopener\">REST rate limits — primary &amp; secondary<\u002Fa><\u002Fli>\n          <li><a href=\"https://docs.github.com/en/graphql/overview/rate-limits-and-query-limits-for-the-graphql-api\" target=\"_blank\" rel=\"noopener\">GraphQL rate limits &amp; point calculation<\u002Fa><\u002Fli>\n          <li><a href=\"https://docs.github.com/en/rest/guides/best-practices-for-integrators\" target=\"_blank\" rel=\"noopener\">Best practices for integrators<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.blog/developer-skills/github/exploring-github-cli-how-to-interact-with-githubs-graphql-api-endpoint/\" target=\"_blank\" rel=\"noopener\">GitHub Blog — GitHub CLI &amp; the GraphQL endpoint (Apr 2025)<\u002Fa><\u002Fli>\n        <\u002Ful>\n\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n        <h3 style=\"margin: 36px 0 16px;\">Root causes found<\u002Fh3>\n    <div class=\"causes\">\n      <div class=\"cause\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div>\n          <h4>The ETag guard was completely broken (silent no-op).<\u002Fh4>\n          <p>AO had code intended to skip the full GraphQL batch when nothing had changed (using HTTP 304 Not Modified). But <code>gh api -i<\u002Fcode> exits with code 1 on a 304, and the catch block was treating that as \"something changed\" — triggering a full GraphQL batch call every single poll cycle regardless. The optimization was doing the opposite of its intent.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cause\">\n        <div class=\"num\">02<\u002Fdiv>\n        <div>\n          <h4>Agents themselves were the bigger consumer.<\u002Fh4>\n          <p>When we ran 5 real Claude Code agents, they exhausted the GraphQL bucket in 31 minutes at ~9,572 pts/hr — <strong>37×<\u002Fstrong> more than AO's own polling. AO consumed only ~10 calls; agents were calling <code>gh<\u002Fcode> constantly through the <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper, which had no visibility or caching.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cause\">\n        <div class=\"num\">03<\u002Fdiv>\n        <div>\n          <h4>Two independent polling loops.<\u002Fh4>\n          <p>The CLI lifecycle manager and the web dashboard were each running their own independent GitHub API polling loops, doubling all traffic. The dashboard was also making individual REST calls for each session's PR data on top of that.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>  <\u002Fsection>\n\n  <!-- ============ HERO: BEFORE / AFTER ============ -->\n  <section>\n    <h2>The hard numbers (after)<\u002Fh2>\n\n    <p class=\"dim\" style=\"margin: 0 0 10px;\">15-session benchmark · 22.6 min trace · Before values extrapolated from pre-fix 5-session baseline. At 15 sessions we consume ~2% of the GraphQL budget.<\u002Fp>\n    <table class=\"data-table\">\n      <thead>\n        <tr>\n          <th style=\"width: 34%;\">Metric<\u002Fth>\n          <th style=\"width: 26%;\">Before (projected)<\u002Fth>\n          <th style=\"width: 26%;\">After (actual)<\u002Fth>\n          <th style=\"width: 14%;\">Δ<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>Total calls (22.6 min)<\u002Ftd><td class=\"num before\">~1,724<\u002Ftd><td class=\"num after\">132<\u002Ftd><td class=\"num delta\">−92%<\u002Ftd><\u002Ftr>\n        <tr><td>Calls / min<\u002Ftd><td class=\"num before\">76.3<\u002Ftd><td class=\"num after\">5.6<\u002Ftd><td class=\"num delta\">−93%<\u002Ftd><\u002Ftr>\n        <tr><td>GraphQL pts / hr<\u002Ftd><td class=\"num before\">~6,216<\u002Ftd><td class=\"num after\">~96<\u002Ftd><td class=\"num delta\">−98%<\u002Ftd><\u002Ftr>\n        <tr><td>REST calls (22.6 min)<\u002Ftd><td class=\"num before\">~1,423<\u002Ftd><td class=\"num after\">122<\u002Ftd><td class=\"num delta\">−91%<\u002Ftd><\u002Ftr>\n        <tr><td>GraphQL calls (22.6 min)<\u002Ftd><td class=\"num before\">~301<\u002Ftd><td class=\"num after\">10<\u002Ftd><td class=\"num delta\">−97%<\u002Ftd><\u002Ftr>\n        <tr><td>Dashboard API calls<\u002Ftd><td class=\"num before\">~150 / 15 min<\u002Ftd><td class=\"num after\">0<\u002Ftd><td class=\"num delta\">−100%<\u002Ftd><\u002Ftr>\n        <tr><td>Per-session GraphQL<\u002Ftd><td class=\"num before\">~414 pts/hr<\u002Ftd><td class=\"num after\">~6.4 pts/hr<\u002Ftd><td class=\"num delta\">−98%<\u002Ftd><\u002Ftr>\n        <tr><td>Max sessions before exhaustion<\u002Ftd><td class=\"num before\">~12<\u002Ftd><td class=\"num after\">~50<\u002Ftd><td class=\"num delta up\">+317%<\u002Ftd><\u002Ftr>\n        <tr><td>Lifecycle managers<\u002Ftd><td class=\"num before\">2<\u002Ftd><td class=\"num after\">1<\u002Ftd><td class=\"num dim\">removed duplication<\u002Ftd><\u002Ftr>\n        <tr><td>Budget status (15 sessions)<\u002Ftd><td class=\"num before\">Over budget at 48 min<\u002Ftd><td class=\"num after\">~2% used<\u002Ftd><td class=\"num dim\">—<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <!-- Current poll architecture diagram -->\n    <div class=\"poll-arch\">\n      <div class=\"poll-arch-head\">\n        <h4>Current poll architecture<\u002Fh4>\n        <div class=\"poll-arch-sub\">15 sessions · 22.6 min trace · 126 total calls · ~96 GraphQL pts/hr<\u002Fdiv>\n      <\u002Fdiv>\n<pre class=\"poll-arch-tree\">pollAll()\n  │\n  ├── <span class=\"pa-phase\">Phase 1:<\u002Fspan> <span class=\"pa-fn\">populatePREnrichmentCache()<\u002Fspan>        <span class=\"pa-comment\">← ONCE for all sessions<\u002Fspan>\n  │     ├── ETag Guard 1 (per repo)                  <span class=\"pa-count\">20 calls<\u002Fspan> <span class=\"pa-note\">(14×304, 6×200)<\u002Fspan>\n  │     ├── ETag Guard 2 (per PR)                     <span class=\"pa-count zero\">0 calls<\u002Fspan> <span class=\"pa-note\">(Guard 1 covered it)<\u002Fspan>\n  │     ├── GraphQL Batch Query                       <span class=\"pa-count\">3 calls<\u002Fspan> <span class=\"pa-note\">(~36 GraphQL pts)<\u002Fspan>\n  │     └── detectPR (only on Guard 1 200)           <span class=\"pa-count\">66 calls<\u002Fspan> <span class=\"pa-note\">(6 cycles × ~11 PR-less sessions)<\u002Fspan>\n  │\n  ├── <span class=\"pa-phase\">Phase 2:<\u002Fspan> <span class=\"pa-fn\">checkSession() × N<\u002Fspan>                 <span class=\"pa-comment\">← per session<\u002Fspan>\n  │     └── determineStatus()\n  │           ├── PR Auto-Detect                      <span class=\"pa-count zero\">0 calls<\u002Fspan> <span class=\"pa-note\">(moved to Phase 1)<\u002Fspan>\n  │           └── Fallback Individual Calls           <span class=\"pa-count zero\">0 calls<\u002Fspan> <span class=\"pa-note\">(removed)<\u002Fspan>\n  │\n  ├── <span class=\"pa-phase\">Phase 3:<\u002Fspan> <span class=\"pa-fn\">maybeDispatchReviewBacklog() × N<\u002Fspan>   <span class=\"pa-comment\">← per session (throttled 2min)<\u002Fspan>\n  │     ├── Guard 3 (review comments ETag)            <span class=\"pa-count\">1 call<\u002Fspan> <span class=\"pa-note\">(0×304, 1×200)<\u002Fspan>\n  │     └── GraphQL review threads + reviews          <span class=\"pa-count\">1 call<\u002Fspan> <span class=\"pa-note\">(~2 GraphQL pts)<\u002Fspan>\n  │\n  ├── <span class=\"pa-phase\">Phase 4:<\u002Fspan> <span class=\"pa-fn\">maybeDispatchCIFailureDetails()<\u002Fspan>        <span class=\"pa-count zero\">0 calls<\u002Fspan> <span class=\"pa-note\">(removed completely)<\u002Fspan>\n  │\n  └── <span class=\"pa-phase\">Phase 5:<\u002Fspan> <span class=\"pa-fn\">maybeDispatchMergeConflicts()<\u002Fspan>          <span class=\"pa-count zero\">0 calls<\u002Fspan> <span class=\"pa-note\">(batch has data)<\u002Fspan>\n\n  Issue view (tracker, 5-min TTL + dedup):           <span class=\"pa-count\">35 calls<\u002Fspan> <span class=\"pa-note\">(2.3 per issue)<\u002Fspan>\n\n  <span class=\"pa-total\">Total: 126 calls  ·  5.6 calls/min  ·  ~96 GraphQL pts/hr<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SUMMARY ============ -->\n  <section>\n    <h2>Summary<\u002Fh2>\n    <div class=\"card\">\n      <div class=\"summary\">\n        AO was hitting GitHub's 5,000 pts/hr GraphQL limit at just <strong>~12 concurrent sessions<\u002Fstrong>, making the 50-session target impossible. The core bug was a broken ETag guard — <code>gh api -i<\u002Fcode> exits code 1 on HTTP 304, so the catch block assumed \"changed\" and fired a full GraphQL batch every poll cycle, making the optimization completely dead.\n        <br><br>\n        On the AO side: in-process per-method TTL caches across <code class=\"pill-path\">scm-github<\u002Fcode> and <code class=\"pill-path\">tracker-github<\u002Fcode> (with inflight dedup), removed individual REST fallbacks from lifecycle polling, consolidated review comment fetching into a single GraphQL call, and dropped an unused <code>reviews<\u002Fcode> field from every batch query. <code class=\"pill-method\">detectPR<\u002Fcode> was then gated behind Guard 1 (<strong>~95%<\u002Fstrong> of PR-discovery calls eliminated) and a third ETag guard was added to cache review threads by HTTP ETag rather than a TTL timer. CI failure details are now delivered in the same transition reaction as the status change (eliminating a two-message follow-up flow and <code class=\"pill-method\">maybeDispatchCIFailureDetails<\u002Fcode> entirely), and merge-conflict messages include the specific base-branch name and behind-status straight from batch cache so agents don't need to re-query. The biggest structural fix was <strong>shared enrichment<\u002Fstrong> — the CLI lifecycle manager persists batch results to session metadata files and the web dashboard reads from disk instead of making its own GitHub API calls, eliminating the duplicate polling loop entirely.\n        <br><br>\n        On the agent side: the <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper now caches <code>gh pr list --head<\u002Fcode> and <code>gh issue view<\u002Fcode>, and the agent prompt includes pre-fetched PR/issue context along with review summaries and thread IDs — agents can resolve review feedback and answer questions without re-querying GitHub.\n        <br><br>\n        Measured against a 15-session, 22.6-minute production trace: GraphQL burn down from ~6,216 to ~96 pts/hr (<strong>−98%<\u002Fstrong>), per-session GraphQL from ~414 to ~6.4 pts/hr (<strong>−98%<\u002Fstrong>), max supported sessions up from ~12 to ~50 (<strong>+317%<\u002Fstrong>), total calls down <strong>−92%<\u002Fstrong>, and dashboard API calls reduced to zero. At 15 sessions we consume just <strong>~2%<\u002Fstrong> of the GraphQL budget, clearing the 50-session target with substantial headroom.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MAJOR STEPS ============ -->\n  <section>\n    <h2>Major Steps<\u002Fh2>\n    <div class=\"steps\">\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Instrumented AO with <code class=\"pill-method\">execGhObserved()<\u002Fcode><\u002Fh4>\n        <p>Added JSONL tracing to all GitHub CLI calls to get baseline visibility on what was being called and how often.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Fixed the broken ETag guard<\u002Fh4>\n        <p><code>gh api -i<\u002Fcode> exits code 1 on HTTP 304; the catch block was treating this as \"changed\" and firing a full GraphQL batch every poll cycle. Fixed by detecting 304 in the error output before treating it as a real failure.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Added in-process caches to <code class=\"pill-path\">scm-github<\u002Fcode><\u002Fh4>\n        <p>Per-method TTLs (5s–60s) on all PR-related calls (<code class=\"pill-method\">detectPR<\u002Fcode>, <code class=\"pill-method\">resolvePR<\u002Fcode>, <code class=\"pill-method\">getPRState<\u002Fcode>, <code class=\"pill-method\">getCIChecks<\u002Fcode>, <code class=\"pill-method\">getMergeability<\u002Fcode>, <code class=\"pill-method\">getReviews<\u002Fcode>, <code class=\"pill-method\">getReviewDecision<\u002Fcode>, <code class=\"pill-method\">getPendingComments<\u002Fcode>).<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Added in-process cache to <code class=\"pill-path\">tracker-github<\u002Fcode><\u002Fh4>\n        <p>5-min TTL on issue reads with inflight dedup (concurrent requests share one API call).<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Removed individual REST fallbacks from lifecycle polling<\u002Fh4>\n        <p><code class=\"pill-method\">determineStatus()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchCIFailureDetails()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchMergeConflicts()<\u002Fcode> no longer fall back to individual <code>gh pr view<\u002Fcode> / <code>gh pr checks<\u002Fcode> calls on batch miss.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Consolidated review comment fetching<\u002Fh4>\n        <p>Replaced the paginated REST <code class=\"pill-method\">getAutomatedComments()<\u002Fcode> call with a single GraphQL <code class=\"pill-method\">getReviewThreads()<\u002Fcode> call.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Removed unused <code>reviews(last: 5)<\u002Fcode> from the batch query<\u002Fh4>\n        <p>It was being fetched on every batch call but never consumed.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Shared enrichment + single lifecycle manager<\u002Fh4>\n        <p>CLI lifecycle manager persists batch enrichment to session metadata files; web dashboard reads from disk instead of calling GitHub. Eliminated the duplicate web polling loop entirely, reducing lifecycle managers from 2 to 1.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Gated <code class=\"pill-method\">detectPR<\u002Fcode> behind Guard 1 ETag<\u002Fh4>\n        <p>Moved <code class=\"pill-method\">detectPR<\u002Fcode> out of <code class=\"pill-method\">determineStatus()<\u002Fcode> into <code class=\"pill-method\">populatePREnrichmentCache()<\u002Fcode>. Guard 1 runs for all repos every cycle. When 304, <code class=\"pill-method\">detectPR<\u002Fcode> is skipped entirely. When 200, <code class=\"pill-method\">detectPR<\u002Fcode> runs for PR-less sessions only.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Added Guard 3 (review comments ETag)<\u002Fh4>\n        <p>REST ETag check on review comments gates the <code class=\"pill-method\">getReviewThreads<\u002Fcode> GraphQL call. 304 → skip GraphQL (0 points). 200 → fetch (2 points). ETag-controlled cache replaces TTL cache.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Enriched review data for agents<\u002Fh4>\n        <p><code class=\"pill-method\">getReviewThreads<\u002Fcode> now fetches <code>reviewThreads(last: 100)<\u002Fcode> + <code>reviews(last: 5)<\u002Fcode>. Agent messages include review summaries, thread IDs, and inline comment data. Prompt instructs agents to resolve threads directly and not re-fetch.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>CI failure details in transition reaction<\u002Fh4>\n        <p>Removed the two-message flow. Agent gets full CI check names + URLs on the first message when status transitions to <code>ci_failed<\u002Fcode>. Removed <code class=\"pill-method\">maybeDispatchCIFailureDetails<\u002Fcode> (Phase 4) entirely.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Enriched merge conflict message<\u002Fh4>\n        <p>Dynamic message with base branch name and behind status from batch cache. Agent no longer needs to call <code>gh pr view<\u002Fcode> for merge status.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ARCHITECTURAL CACHES ============ -->\n  <section>\n    <h2>Architectural Caches<\u002Fh2>\n    <div class=\"cache-grid\">\n      <div class=\"cache-card\">\n        <h4><span class=\"n\">01<\u002Fspan> ETag guards (HTTP 304)<\u002Fh4>\n        <p>Three REST ETag guards gate expensive operations before firing GraphQL. Each makes a cheap REST call with <code>If-None-Match<\u002Fcode>; on 304 the downstream work is skipped entirely.<\u002Fp>\n        <ul class=\"sub\" style=\"margin-top:8px;\">\n          <li><strong>Guard 1<\u002Fstrong> — PR list changes per repo (<strong>88% hit rate<\u002Fstrong>). Gates the GraphQL batch query AND <code class=\"pill-method\">detectPR<\u002Fcode> for all sessions in that repo.<\u002Fli>\n          <li><strong>Guard 2<\u002Fstrong> — Commit status changes per PR (<strong>85% hit rate<\u002Fstrong>). Gates the GraphQL batch when Guard 1 returns 304.<\u002Fli>\n          <li><strong>Guard 3<\u002Fstrong> — Review comments per PR (<strong>~95% hit rate<\u002Fstrong> in steady state). Gates the <code class=\"pill-method\">getReviewThreads<\u002Fcode> GraphQL call. ETag-controlled cache replaces TTL — cached results reused until Guard 3 detects new comments.<\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top:10px;\">The original bug was that Guard 1 was completely broken — <code>gh<\u002Fcode> exits code 1 on 304 and the catch block assumed \"changed\" every time. Fixing it meant most poll cycles skip the batch entirely.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cache-card\">\n        <h4><span class=\"n\">02<\u002Fspan> Shared enrichment metadata (disk)<\u002Fh4>\n        <p>The lifecycle manager now persists the full batch result (<code>prEnrichment<\u002Fcode> + <code>prReviewComments<\u002Fcode>) to session metadata files on disk after every poll. The web dashboard reads from these files instead of calling GitHub itself.<\u002Fp>\n        <p><strong>Why:<\u002Fstrong> the dashboard and CLI were running two independent polling loops — both hitting GitHub for the same data. Removing the dashboard's loop and having it read from disk eliminated <strong>~54% of all duplicate traffic<\u002Fstrong> and brought dashboard API calls to zero.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cache-card\">\n        <h4><span class=\"n\">03<\u002Fspan> <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper cache (disk, per-session)<\u002Fh4>\n        <p>Every <code>gh<\u002Fcode> call agents make goes through this wrapper. It caches <code>gh pr list --head<\u002Fcode> with <strong>infinite TTL<\u002Fstrong> (branch→PR mapping is permanent once created) and <code>gh issue view<\u002Fcode> with <strong>300s TTL<\u002Fstrong> (agents kept re-fetching the same issue to remind themselves of the task).<\u002Fp>\n        <p><strong>Why:<\u002Fstrong> agent-side <code>gh<\u002Fcode> consumption was completely untracked and uncached — 5 real agents exhausted the entire GraphQL bucket in 31 minutes. This was the biggest surprise of the whole investigation.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CACHE TTL REFERENCE ============ -->\n  <section>\n    <h2>Cache TTL Reference<\u002Fh2>\n\n    <div class=\"ref-block\">\n      <div class=\"ref-title\">\n        <h4><code class=\"pill-path\">scm-github<\u002Fcode> — In-process per-instance cache<\u002Fh4>\n      <\u002Fdiv>\n      <p class=\"ref-sub\">Max 1,000 entries. Invalidated on mutations (<code class=\"pill-method\">mergePR<\u002Fcode>, <code class=\"pill-method\">closePR<\u002Fcode>, <code class=\"pill-method\">assignPRToCurrentUser<\u002Fcode>).<\u002Fp>\n      <table class=\"data-table\">\n        <thead><tr><th>Method<\u002Fth><th>TTL<\u002Fth><th>What's cached<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code class=\"pill-method\">detectPR<\u002Fcode><\u002Ftd><td class=\"ttl\">30s<\u002Ftd><td>Branch → PR mapping<\u002Ftd><td>Positive-only. Never caches null (missing PR).<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">resolvePR<\u002Fcode><\u002Ftd><td class=\"ttl\">60s<\u002Ftd><td>PR identity metadata (number, url, title, branch refs, isDraft)<\u002Ftd><td>Stable for life of PR.<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getPRState<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>open / merged / closed<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getPRSummary<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>state + title + additions/deletions<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getCIChecks<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>CI check list (name, state, link, timestamps)<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getMergeability<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>Composite merge readiness + blockers<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getReviews<\u002Fcode><\u002Ftd><td class=\"ttl\">10s<\u002Ftd><td>Review array (state, body, author)<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getReviewDecision<\u002Fcode><\u002Ftd><td class=\"ttl\">10s<\u002Ftd><td>approved / changes_requested / pending<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getPendingComments<\u002Fcode><\u002Ftd><td class=\"ttl\">10s<\u002Ftd><td>Unresolved review threads (GraphQL)<\u002Ftd><td>Backward compat for GitLab. GitHub uses <code class=\"pill-method\">getReviewThreads<\u002Fcode> instead.<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getReviewThreads<\u002Fcode><\u002Ftd><td class=\"ttl\">ETag-controlled<\u002Ftd><td>Threads + review summaries<\u002Ftd><td>No TTL. Freshness managed by Guard 3 — cached until new comments detected.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"ref-block\">\n      <div class=\"ref-title\">\n        <h4><code class=\"pill-path\">tracker-github<\u002Fcode> — In-process per-instance cache<\u002Fh4>\n      <\u002Fdiv>\n      <p class=\"ref-sub\">Max 500 entries. Invalidated on mutations (<code class=\"pill-method\">updateIssue<\u002Fcode>). Inflight dedup prevents concurrent duplicate requests.<\u002Fp>\n      <table class=\"data-table\">\n        <thead><tr><th>Method<\u002Fth><th>TTL<\u002Fth><th>What's cached<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code class=\"pill-method\">getIssue<\u002Fcode><\u002Ftd><td class=\"ttl\">5 min<\u002Ftd><td>Issue metadata (title, body, state, labels, assignees)<\u002Ftd><td><code class=\"pill-method\">isCompleted<\u002Fcode> routes through this. Concurrent calls share one request.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"ref-block\">\n      <div class=\"ref-title\">\n        <h4><code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper — Agent-side bash cache (disk, per-session)<\u002Fh4>\n      <\u002Fdiv>\n      <p class=\"ref-sub\">Stored in <code class=\"pill-path\">$AO_DATA_DIR/.ghcache/$AO_SESSION/<\u002Fcode>. Cache key includes <code>--json<\u002Fcode> fields.<\u002Fp>\n      <table class=\"data-table\">\n        <thead><tr><th>Command<\u002Fth><th>TTL<\u002Fth><th>What's cached<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code>gh pr list --head &lt;branch&gt; --limit 1<\u002Fcode><\u002Ftd><td class=\"ttl\">Infinite<\u002Ftd><td>Branch → PR JSON<\u002Ftd><td>Positive-only. Never caches empty <code>[]<\u002Fcode>.<\u002Ftd><\u002Ftr>\n          <tr><td><code>gh issue view &lt;N&gt;<\u002Fcode><\u002Ftd><td class=\"ttl\">300s<\u002Ftd><td>Issue JSON response<\u002Ftd><td>Any successful response cached.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TRADEOFFS ============ -->\n  <section>\n    <h2>Tradeoffs<\u002Fh2>\n    <div class=\"steps trade\">\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Cache TTLs vs data freshness<\u002Fh4>\n        <p>Tightest TTLs (5s) on fast-changing fields (CI state, mergeability, PR state), looser (10s–30s) on slower-changing ones (reviews, <code class=\"pill-method\">detectPR<\u002Fcode>). Lifecycle could act on data that's a few seconds stale. Accepted because 5s is well under one poll cycle.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Positive-only caching for <code class=\"pill-method\">detectPR<\u002Fcode><\u002Fh4>\n        <p>Never cache a null (no PR found). A just-created PR must surface on the next poll, so we pay the <code>gh<\u002Fcode> call cost on every miss. Tradeoff: cache is only useful after PR creation, not before.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Batch miss → wait for next cycle<\u002Fh4>\n        <p>Removed individual REST fallbacks entirely. If the batch fails, lifecycle waits for the next poll rather than fetching fresh data immediately. In practice the batch query never fails, so this only adds up to 30s latency in the rare failure case while eliminating <strong>~12 individual API calls per poll cycle<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Dashboard reads from disk, not live API<\u002Fh4>\n        <p>Dashboard freshness is now tied to the lifecycle poll interval (30s) instead of being real-time. Tradeoff: slightly stale dashboard in exchange for zero GitHub API calls from the web process. If a PR gets merged or CI fails, the dashboard won't reflect it until the next lifecycle poll writes fresh metadata (up to 30s delay).<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Reverted PR-scoped ETag guards<\u002Fh4>\n        <p>Added per-PR ETag checks instead of per-repo, but this increased REST calls (1 per PR vs 1 per repo) without meaningful GraphQL savings. Reverted when traces showed REST delta went <strong>16 → 142<\u002Fstrong> while GraphQL stayed flat.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4><code class=\"pill-method\">detectPR<\u002Fcode> gated by Guard 1<\u002Fh4>\n        <p><code class=\"pill-method\">detectPR<\u002Fcode> only runs when Guard 1 returns 200. Max 30-second delay in discovering a just-created PR (one poll cycle). Eliminates <strong>~95% of <code class=\"pill-method\">detectPR<\u002Fcode> calls<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Review threads cost doubled (1 → 2 points)<\u002Fh4>\n        <p>Adding <code>reviews(last: 5)<\u002Fcode> to the query increases cost from 1 to 2 GraphQL points. But Guard 3 skips <strong>~95%<\u002Fstrong> of calls, so net cost is lower than before.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ DETAILED CHANGELOG (COLLAPSIBLE) ============ -->\n  <section>\n    <h2>Detailed Changelog<\u002Fh2>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">A<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Tracer Infrastructure<\u002Fdiv>\n            <div class=\"t-date\">Apr 14 – 16<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>Added <code class=\"pill-method\">execGhObserved()<\u002Fcode><\u002Fstrong> — JSONL tracing for all AO-side GitHub CLI calls, writing to <code class=\"pill-path\">$AO_GH_TRACE_FILE<\u002Fcode><\u002Fli>\n          <li><strong>Migrated <code class=\"pill-path\">scm-github<\u002Fcode> and <code class=\"pill-path\">tracker-github<\u002Fcode> call sites<\u002Fstrong> to use <code class=\"pill-method\">execGhObserved()<\u002Fcode><\u002Fli>\n          <li><strong>Fixed operation naming<\u002Fstrong> — <code class=\"pill-method\">extractOperation()<\u002Fcode> was mis-bucketing REST calls by not skipping dash-prefixed flags<\u002Fli>\n          <li><strong>Added <code>-i<\u002Fcode> flag to <code class=\"pill-method\">executeBatchQuery<\u002Fcode><\u002Fstrong> — required for ETag/304 response headers<\u002Fli>\n          <li><strong>Added per-reset-window burn segmentation<\u002Fstrong> to trace analyzers (<code class=\"pill-path\">analyze-trace.mjs<\u002Fcode>, <code class=\"pill-path\">drill-tracer.mjs<\u002Fcode>)<\u002Fli>\n          <li><strong>Fixed mocked <code class=\"pill-method\">execFile<\u002Fcode> path regressions<\u002Fstrong> — guarded stderr/stdout against undefined; bounded operation cardinality by taking only first REST URL path segment<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">B<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">ETag Guard Bug Fix<\u002Fdiv>\n            <div class=\"t-date\">Apr 16 – 17<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li>\n            <strong>Fixed the core ETag 304 bug<\u002Fstrong> — <code>gh api -i<\u002Fcode> exits with code 1 on HTTP 304. The catch block was returning <code>true<\u002Fcode> (assumed \"changed\"), firing a full GraphQL batch every poll cycle. Fix: detect 304 in the error's stdout/stderr before treating it as a real error. Unified regex for HTTP/1.1, HTTP/2, HTTP/2.0.\n            <div class=\"result\">Result: 100% ETag 304 hit rate, 0 GraphQL batch calls in steady state, 5% GraphQL budget at 5 sessions.<\u002Fdiv>\n          <\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">C<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Agent-Side Consumption<\u002Fdiv>\n            <div class=\"t-date\">Apr 18 – 22<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>Patched <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper with invocation logging<\u002Fstrong> — every <code>gh<\u002Fcode> call from agents logged to a JSONL trace<\u002Fli>\n          <li><strong>Fixed dash-prefixed args in wrapper logging<\u002Fstrong> — <code>gh --version<\u002Fcode> was being mangled<\u002Fli>\n          <li><strong>Analyzed agent-side waste<\u002Fstrong> — <code>gh pr list --head<\u002Fcode> was 65% of all agent-side wrapper calls; each branch queried 36–75× identically<\u002Fli>\n          <li>\n            <strong>Added wrapper read-through cache:<\u002Fstrong>\n            <ul class=\"sub\">\n              <li><code>gh pr list --head<\u002Fcode>: infinite TTL for positive results (598 → ~10 calls, <strong>98% reduction<\u002Fstrong>)<\u002Fli>\n              <li><code>gh issue view<\u002Fcode>: 300s TTL (75 → ~20 calls, <strong>73% reduction<\u002Fstrong>)<\u002Fli>\n            <\u002Ful>\n          <\u002Fli>\n          <li><strong>Lifted PATH wrapper installation into session-manager universally<\u002Fstrong> — removed per-agent-plugin duplication<\u002Fli>\n          <li><strong>Added cache-hit/miss tracing to wrapper<\u002Fstrong> — <code>cacheResult<\u002Fcode> field: hit/miss-stored/miss-negative/miss-error; added <code>operation<\u002Fcode>, <code>durationMs<\u002Fcode>, <code>exitCode<\u002Fcode>, <code>ok<\u002Fcode> fields to trace<\u002Fli>\n          <li><strong>Fixed <code class=\"pill-method\">execGhObserved()<\u002Fcode> resolving to the wrapper<\u002Fstrong> — it was calling <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> (the wrapper) instead of the real <code>gh<\u002Fcode> binary, causing AO traces to pollute agent traces and cache to silently fail. Fixed by stripping <code class=\"pill-path\">~/.ao/bin<\u002Fcode> from PATH at startup<\u002Fli>\n          <li><strong>Fixed critical macOS PATH bug<\u002Fstrong> — macOS zsh <code class=\"pill-method\">path_helper<\u002Fcode> resets PATH during shell init in tmux sessions, wiping <code class=\"pill-path\">~/.ao/bin<\u002Fcode>. The wrapper was never active on macOS. Fix: write <code>export PATH=...<\u002Fcode> into a launch script (initial <code>send-keys<\u002Fcode> approach sent 1000+ keystrokes and broke terminal input buffers)<\u002Fli>\n          <li><strong>Hardened wrapper cache correctness<\u002Fstrong> — cache key now includes <code>--json<\u002Fcode> fields; only caches stdout; fixed trailing newline; supports <code>--key=value<\u002Fcode> syntax; logs <code>miss-write-failed<\u002Fcode><\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">D<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">AO-Side Cache + Consolidation<\u002Fdiv>\n            <div class=\"t-date\">Apr 22<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li>\n            <strong>Added in-process per-instance cache to <code class=\"pill-path\">scm-github<\u002Fcode><\u002Fstrong> with per-method TTLs:\n            <ul class=\"sub\">\n              <li><code class=\"pill-method\">resolvePR<\u002Fcode>: 60s<\u002Fli>\n              <li><code class=\"pill-method\">getPRState<\u002Fcode>, <code class=\"pill-method\">getPRSummary<\u002Fcode>, <code class=\"pill-method\">getReviews<\u002Fcode>, <code class=\"pill-method\">getReviewDecision<\u002Fcode>: 5s<\u002Fli>\n              <li><code class=\"pill-method\">getCIChecks<\u002Fcode>, <code class=\"pill-method\">getMergeability<\u002Fcode>, <code class=\"pill-method\">getPendingComments<\u002Fcode>: 5s<\u002Fli>\n              <li><code class=\"pill-method\">detectPR<\u002Fcode>: 5s positive-only<\u002Fli>\n              <li>Mutation methods invalidate cache<\u002Fli>\n              <li>Tuned TTLs via cache-replay: <code class=\"pill-method\">detectPR<\u002Fcode> 5s→30s, <code class=\"pill-method\">getReviewDecision<\u002Fcode> 5s→10s, <code class=\"pill-method\">getPendingComments<\u002Fcode> 5s→10s<\u002Fli>\n            <\u002Ful>\n          <\u002Fli>\n          <li><strong>Added in-process issue cache to <code class=\"pill-path\">tracker-github<\u002Fcode><\u002Fstrong> — <code>Map&lt;string, CachedIssue&gt;<\u002Fcode>, 5-min TTL, bounded to 500 entries (LRU evict-oldest). <code class=\"pill-method\">isCompleted<\u002Fcode> routed through <code class=\"pill-method\">getIssue<\u002Fcode>. ~744 → ~15 <code>gh issue view<\u002Fcode> calls per run<\u002Fli>\n          <li><strong>Removed individual REST fallbacks from lifecycle polling<\u002Fstrong> — <code class=\"pill-method\">determineStatus()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchCIFailureDetails()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchMergeConflicts()<\u002Fcode> no longer fall back to individual <code>gh pr view<\u002Fcode>/<code>gh pr checks<\u002Fcode> on batch cache miss. Eliminated ~110 calls per 15-min window (<strong>24% of AO-side traffic<\u002Fstrong>)<\u002Fli>\n          <li><strong>Consolidated review comment fetching into single GraphQL call<\u002Fstrong> — added <code class=\"pill-method\">getReviewThreads()<\u002Fcode> to SCM interface. Eliminated <code class=\"pill-method\">getAutomatedComments()<\u002Fcode> REST call (~40 calls/15 min)<\u002Fli>\n          <li><strong>Removed unused <code>reviews(last: 5)<\u002Fcode> from batch query<\u002Fstrong> — it was fetched but never consumed, wasting GraphQL complexity on every batch call<\u002Fli>\n          <li><strong>Reverted PR-scoped ETag guards<\u002Fstrong> — per-PR ETag added more REST calls (1 per PR vs 1 per repo) without meaningful GraphQL savings; core REST delta went 16→142 while GraphQL stayed flat<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">E<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Shared Enrichment Architecture<\u002Fdiv>\n            <div class=\"t-date\">Apr 22 – 23<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>CLI lifecycle manager now persists batch enrichment to session metadata<\u002Fstrong> — <code>prEnrichment<\u002Fcode> and <code>prReviewComments<\u002Fcode> keys written after each poll cycle<\u002Fli>\n          <li><strong>Web dashboard reads metadata instead of calling GitHub API<\u002Fstrong> — <code class=\"pill-path\">serialize.ts<\u002Fcode> reads enrichment from disk. Dashboard freshness improved from <strong>5 min → 30s<\u002Fstrong> (tied to lifecycle poll)<\u002Fli>\n          <li><strong>Removed web dashboard's duplicate lifecycle manager<\u002Fstrong> — eliminated the second independent polling loop that was the source of ~54% of remaining duplicate traffic. Dashboard API calls: <strong>~150/15 min → 0<\u002Fstrong><\u002Fli>\n          <li><strong>Fixed <code class=\"pill-method\">storageKey<\u002Fcode> usage in <code class=\"pill-method\">persistPREnrichmentToMetadata<\u002Fcode><\u002Fstrong> — was using wrong key for <code class=\"pill-method\">getSessionsDir<\u002Fcode><\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">F<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Gate <code class=\"pill-method\" style=\"font-size:14px;\">detectPR<\u002Fcode> behind Guard 1 ETag<\u002Fdiv>\n            <div class=\"t-date\">Apr 24<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li>\n            <strong>Moved <code class=\"pill-method\">detectPR<\u002Fcode> out of <code class=\"pill-method\">determineStatus()<\u002Fcode> into <code class=\"pill-method\">populatePREnrichmentCache()<\u002Fcode><\u002Fstrong> — <code class=\"pill-method\">detectPR<\u002Fcode> now runs once per poll cycle for all PR-less sessions, gated by Guard 1. When Guard 1 returns 304 (no PR list changes in the repo), all <code class=\"pill-method\">detectPR<\u002Fcode> calls are skipped — no new PRs can exist. When Guard 1 returns 200, <code class=\"pill-method\">detectPR<\u002Fcode> runs for PR-less sessions in that repo only.\n          <\u002Fli>\n          <li><strong>Added <code>prListUnchangedRepos<\u002Fcode> to ETag guard result<\u002Fstrong> — <code class=\"pill-method\">shouldRefreshPREnrichment()<\u002Fcode> now tracks which repos returned 304. Reported to the lifecycle manager via <code class=\"pill-method\">BatchObserver.reportPRListUnchangedRepos()<\u002Fcode> callback.<\u002Fli>\n          <li>\n            <strong>Removed <code class=\"pill-method\">detectPR<\u002Fcode> block from <code class=\"pill-method\">determineStatus()<\u002Fcode><\u002Fstrong> — PR discovery is fully handled in <code class=\"pill-method\">populatePREnrichmentCache<\u002Fcode> before session checks run. No flags, no fallback.\n            <div class=\"result\">Impact: 10 sessions with no PRs for 10 minutes → ~200 wasted calls reduced to ~10 (only on 200 cycles). ~95% reduction in <code>detectPR<\u002Fcode> calls. Tradeoff: max 30-second delay (one poll cycle) in discovering a just-created PR.<\u002Fdiv>\n          <\u002Fli>\n          <li><strong>Guard 1 now always runs for all repos<\u002Fstrong> — <code class=\"pill-method\">enrichSessionsPRBatch<\u002Fcode> accepts optional <code>repos<\u002Fcode> param. Lifecycle passes repos from all sessions (not just ones with PRs). Guard 1 runs even when no sessions have PRs yet, so <code class=\"pill-method\">detectPR<\u002Fcode> is gated from the very first cycle.<\u002Fli>\n          <li><strong>Issue view inflight dedup<\u002Fstrong> — Added promise-based dedup in <code class=\"pill-path\">tracker-github<\u002Fcode>. Concurrent calls for the same issue share one request instead of two. Reduced issue view calls from 6 to 3 per 15 min.<\u002Fli>\n          <li><strong>Thread ID included in review messages<\u002Fstrong> — <code class=\"pill-method\">getReviewThreads<\u002Fcode> and <code class=\"pill-method\">getPendingComments<\u002Fcode> now return <code>threadId<\u002Fcode> (the GraphQL node ID for <code class=\"pill-method\">resolveReviewThread<\u002Fcode>). Agent message includes it so agents can resolve threads directly without re-fetching.<\u002Fli>\n          <li><strong>Agent prompt nudge for issue context<\u002Fstrong> — <code class=\"pill-method\">generatePrompt<\u002Fcode> now tells the agent \"You should not need to call <code>gh issue view<\u002Fcode> unless you need additional context beyond what is provided here.\"<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">G<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Enrich Review Data + Guard 3<\u002Fdiv>\n            <div class=\"t-date\">Apr 24<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>Added Guard 3 (review comments ETag)<\u002Fstrong> — <code class=\"pill-method\">checkReviewCommentsETag()<\u002Fcode> checks <code>GET /repos/{owner}/{repo}/pulls/{number}/comments?per_page=1<\u002Fcode> with ETag before the <code class=\"pill-method\">getReviewThreads<\u002Fcode> GraphQL call. 304 → skip GraphQL entirely (0 points), 200 → proceed (2 points).<\u002Fli>\n          <li><strong>Enriched <code class=\"pill-method\">getReviewThreads<\u002Fcode> query<\u002Fstrong> — Changed from <code>reviewThreads(first: 100)<\u002Fcode> to <code>reviewThreads(last: 100)<\u002Fcode> (most recent threads). Added <code>reviews(last: 5)<\u002Fcode> to fetch review submission summaries (the body submitted with \"Changes requested\" / \"Approve\"). Cost: 105/100 = 2 GraphQL points (up from 1, but Guard 3 skips ~95% of calls).<\u002Fli>\n          <li><strong>Added <code>ReviewSummary<\u002Fcode> and <code>ReviewThreadsResult<\u002Fcode> types<\u002Fstrong> — <code class=\"pill-method\">getReviewThreads<\u002Fcode> now returns <code>{ threads: ReviewComment[]; reviews: ReviewSummary[] }<\u002Fcode> instead of just <code>ReviewComment[]<\u002Fcode>.<\u002Fli>\n          <li><strong>ETag-controlled cache replaces TTL cache<\u002Fstrong> — Review threads + reviews cached per PR instance. Freshness controlled by Guard 3 ETag (not a TTL timer). Cache invalidated only when Guard 3 returns 200 (new comments exist).<\u002Fli>\n          <li><strong>Review summaries included in agent message<\u002Fstrong> — When dispatching review feedback, the agent now sees the reviewer's high-level summary prepended before inline comments (e.g. <code>Review by @reviewer (CHANGES_REQUESTED): \"This approach is wrong, use strategy X instead\"<\u002Fcode>).<\u002Fli>\n          <li><strong>Review summaries persisted to metadata<\u002Fstrong> — <code>prReviewComments<\u002Fcode> blob now includes review summaries for dashboard consumption.<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">H<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">CI Details in Transition + Merge Conflict Enrichment<\u002Fdiv>\n            <div class=\"t-date\">Apr 25<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>Merged CI failure details into transition reaction<\u002Fstrong> — when status transitions to <code>ci_failed<\u002Fcode>, the transition reaction now sends the full detailed message (check names, statuses, URLs) from batch cache instead of a static \"Run <code>gh pr checks<\u002Fcode>\" string. Agent gets everything in one message on the first poll.<\u002Fli>\n          <li><strong>Removed <code class=\"pill-method\">maybeDispatchCIFailureDetails<\u002Fcode> (Phase 4)<\u002Fstrong> — the separate follow-up dispatch is no longer needed. Transition reaction handles everything. Removes the two-message flow, CI fingerprinting/dedup logic, and <code>lastCIFailureFingerprint<\u002Fcode>/<code>lastCIFailureDispatchHash<\u002Fcode> metadata.<\u002Fli>\n          <li><strong>Updated default ci-failed config message<\u002Fstrong> — removed \"Run <code>gh pr checks<\u002Fcode>\" instruction. Fallback message is now \"Investigate the failures, fix the issues, and push again.\"<\u002Fli>\n          <li>\n            <strong>Enriched merge conflict message<\u002Fstrong> — replaced static \"Your branch has merge conflicts\" with dynamic message using <code>cachedData.isBehind<\u002Fcode> and <code>session.pr.baseBranch<\u002Fcode>:\n            <div class=\"result\" style=\"font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; white-space: pre-line; color: var(--ink-dim);\">Your PR branch is behind main and has merge conflicts with main.\nRebase your branch on main, resolve the conflicts, and push.\nYou should not need to call gh for merge status unless you need\nadditional context — this information is current.<\u002Fdiv>\n          <\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
