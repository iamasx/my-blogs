  color: var(--bad); font-size: 22px; font-variant-numeric: tabular-nums;\n    text-shadow: 0 0 24px rgba(248,113,113,0.12);\n  }\n  .metrics .cell.after {\n    color: var(--good); font-size: 22px; font-variant-numeric: tabular-nums;\n    text-shadow: 0 0 24px rgba(34,197,94,0.12);\n  }\n  .metrics .cell.delta {\n    color: var(--accent); font-size: 18px; font-weight: 500;\n    font-variant-numeric: tabular-nums;\n  }\n  .metrics .cell.delta.up { color: var(--good); }\n  .metrics .cell.delta.down { color: var(--accent); }\n\n  .metrics .row-last .cell { border-bottom: 0; }\n\n  .calc-box {\n    margin-top: 28px;\n    background: rgba(0,0,0,0.25);\n    border: 1px solid var(--line);\n    border-radius: var(--radius-sm);\n    padding: 18px 22px;\n    font-size: 13.5px; color: var(--ink-dim);\n    line-height: 1.8;\n  }\n  .calc-box b { color: #fff; font-weight: 600; }\n  .calc-box .arrow { color: var(--accent); }\n\n  /* -------- Summary -------- */\n  .summary {\n    border-left: 2px solid var(--accent);\n    padding: 4px 0 4px 24px;\n    color: var(--ink);\n    font-size: 16px;\n    line-height: 1.75;\n  }\n\n  /* -------- Step cards -------- */\n  .steps { display: grid; gap: 14px; counter-reset: step; }\n  .step {\n    display: grid; grid-template-columns: 56px 1fr; gap: 22px;\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); padding: 22px 26px;\n    transition: border-color 0.15s;\n  }\n  .step:hover { border-color: var(--line-2); }\n  .step .badge {\n    counter-increment: step;\n    width: 40px; height: 40px; border-radius: 10px;\n    display: grid; place-items: center;\n    background: var(--panel-2);\n    border: 1px solid var(--line-2);\n    color: var(--accent);\n    font-family: ui-monospace, monospace;\n    font-size: 15px; font-weight: 500;\n  }\n  .step .badge::before { content: counter(step, decimal-leading-zero); }\n  .step h4 { margin: 4px 0 6px; font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.005em; }\n  .step p { margin: 0; color: var(--ink-dim); font-size: 14.5px; line-height: 1.65; }\n\n  /* Tradeoffs variant — warning tint */\n  .steps.trade .step .badge { color: var(--warn); }\n  .steps.future .step .badge { color: var(--good); }\n\n  /* -------- Caches cards -------- */\n  .cache-grid { display: grid; gap: 14px; }\n  .cache-card {\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); padding: 24px 28px;\n  }\n  .cache-card h4 {\n    margin: 0 0 10px; font-size: 17px; font-weight: 600; color: #fff;\n    display: flex; gap: 12px; align-items: baseline;\n  }\n  .cache-card h4 .n {\n    font-family: ui-monospace, monospace; color: var(--accent);\n    font-size: 13px; font-weight: 500;\n  }\n  .cache-card p { color: var(--ink-dim); font-size: 14.5px; line-height: 1.7; margin: 0; }\n  .cache-card p + p { margin-top: 10px; }\n\n  /* -------- Reference tables -------- */\n  .ref-table {\n    width: 100%; border-collapse: separate; border-spacing: 0;\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); overflow: hidden;\n    font-size: 14px;\n  }\n  .ref-table th, .ref-table td {\n    padding: 12px 18px; text-align: left;\n    border-bottom: 1px solid var(--line);\n    vertical-align: top;\n  }\n  .ref-table tr:last-child td { border-bottom: 0; }\n  .ref-table th {\n    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--ink-faint); font-weight: 600; background: var(--bg-2);\n  }\n  .ref-table td { color: var(--ink-dim); }\n  .ref-table td:first-child { color: #fff; }\n  .ref-table td.ttl { font-family: ui-monospace, monospace; color: var(--accent); white-space: nowrap; }\n\n  .ref-title {\n    display: flex; align-items: center; gap: 14px;\n    margin: 0 0 8px;\n  }\n  .ref-title h4 { margin: 0; font-size: 17px; font-weight: 600; color: #fff; }\n  .ref-title .hint { color: var(--ink-faint); font-size: 13px; }\n  .ref-block + .ref-block { margin-top: 28px; }\n  .ref-sub { color: var(--ink-dim); font-size: 13.5px; margin: 0 0 14px; }\n\n  /* -------- Collapsible changelog -------- */\n  .track {\n    background: var(--panel); border: 1px solid var(--line);\n    border-radius: var(--radius); overflow: hidden;\n  }\n  .track + .track { margin-top: 12px; }\n  .track summary {\n    list-style: none; cursor: pointer;\n    padding: 20px 26px;\n    display: flex; justify-content: space-between; align-items: center;\n    gap: 20px;\n    transition: background 0.15s;\n  }\n  .track summary::-webkit-details-marker { display: none; }\n  .track summary:hover { background: var(--panel-2); }\n  .track[open] summary { border-bottom: 1px solid var(--line); }\n\n  .track .t-left { display: flex; align-items: center; gap: 16px; min-width: 0; }\n  .track .letter {\n    width: 36px; height: 36px; border-radius: 8px;\n    display: grid; place-items: center;\n    background: rgba(125,211,252,0.08);\n    border: 1px solid rgba(125,211,252,0.2);\n    color: var(--accent);\n    font-family: ui-monospace, monospace; font-size: 15px; font-weight: 600;\n  }\n  .track .t-title { font-size: 16px; font-weight: 600; color: #fff; }\n  .track .t-date { font-family: ui-monospace, monospace; font-size: 12px; color: var(--ink-faint); margin-top: 2px; }\n  .track .caret {\n    width: 12px; height: 12px; border-right: 2px solid var(--ink-faint);\n    border-bottom: 2px solid var(--ink-faint); transform: rotate(45deg);\n    transition: transform 0.15s;\n    flex-shrink: 0;\n  }\n  .track[open] .caret { transform: rotate(-135deg); }\n\n  .track .body { padding: 8px 26px 26px; }\n  .track .body ol {\n    list-style: none; padding: 0; margin: 0; counter-reset: tstep;\n  }\n  .track .body ol > li {\n    counter-increment: tstep;\n    padding: 16px 0 16px 44px;\n    position: relative;\n    border-top: 1px solid var(--line);\n    color: var(--ink-dim);\n    font-size: 14.5px;\n    line-height: 1.65;\n  }\n  .track .body ol > li::before {\n    content: counter(tstep, decimal-leading-zero);\n    position: absolute; left: 0; top: 16px;\n    font-family: ui-monospace, monospace;\n    color: var(--ink-faint); font-size: 12px;\n    letter-spacing: 0.05em;\n  }\n  .track .body ol > li strong { color: #fff; }\n  .track .body ul.sub {\n    margin: 10px 0 0; padding: 0 0 0 18px;\n    list-style: none;\n  }\n  .track .body ul.sub li {\n    padding: 6px 0 6px 16px;\n    position: relative;\n    color: var(--ink-dim);\n    font-size: 14px;\n  }\n  .track .body ul.sub li::before {\n    content: \"\"; position: absolute; left: 0; top: 16px;\n    width: 8px; height: 1px; background: var(--line-2);\n  }\n  .track .body .result {\n    margin-top: 8px; padding: 10px 14px;\n    background: rgba(34,197,94,0.06);\n    border: 1px solid rgba(34,197,94,0.15);\n    border-left: 3px solid var(--good);\n    border-radius: 6px;\n    font-size: 13.5px; color: #bbf7d0;\n  }\n\n  /* -------- Footer divider between sections -------- */\n  .rule {\n    height: 1px; background: var(--line); margin: 56px 0;\n  }\n\n  /* -------- Responsive -------- */\n  @media (max-width: 820px) {\n    .wrap { padding: 32px 20px 60px; }\n    h1 { font-size: 32px; }\n    .metrics { grid-template-columns: 1fr 1fr; }\n    .metrics .col-head.label, .metrics .cell.label { grid-column: 1 / -1; padding-bottom: 8px; border-bottom: 0; font-weight: 600; font-size: 14px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.08em; }\n    .metrics .cell { padding: 14px 12px 14px 0; font-size: 18px !important; }\n    .quota-row { grid-template-columns: 1fr; }\n    .hero { padding: 24px; }\n  }\n  @media print {\n    body { background: #fff; color: #000; }\n    .track .body { display: block !important; }\n    details[open] { page-break-inside: avoid; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <header class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Engineering · Findings report · PR #1238<\u002Fdiv>\n    <h1>GitHub API Rate Limiting — Complete Change Log<\u002Fh1>\n    <p class=\"sub\">How AO's GitHub API consumption was traced, diagnosed, and reduced — taking the practical ceiling from ~12 concurrent sessions to ~41 on a single PAT.<\u002Fp>\n    <div class=\"meta-row\">\n      <span><b>Scope:<\u002Fb> <code class=\"mono\">scm-github<\u002Fcode> · <code class=\"mono\">tracker-github<\u002Fcode> · <code class=\"mono\">~/.ao/bin/gh<\u002Fcode><\u002Fspan>\n      <span><b>Window:<\u002Fb> Apr 14 – Apr 23<\u002Fspan>\n      <span><b>Tracks:<\u002Fb> A – E<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ PROBLEM ============ -->\n  <section>\n    <h2>The Problem<\u002Fh2>\n\n    <div class=\"alert\">\n      <div class=\"tag\">Blocking issue<\u002Fdiv>\n      <p class=\"big\">AO was burning through GitHub's API rate limits too fast, making it impossible to run many concurrent sessions.<\u002Fp>\n      <div class=\"quota-row\">\n        <div class=\"quota\"><div class=\"k\">GitHub budget / PAT<\u002Fdiv><div class=\"v\">5,000 <span style=\"color:var(--ink-faint);font-size:14px;\">REST / hr<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"quota\"><div class=\"k\">GraphQL points / PAT<\u002Fdiv><div class=\"v\">5,000 <span style=\"color:var(--ink-faint);font-size:14px;\">pts / hr<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"quota\"><div class=\"k\">Target<\u002Fdiv><div class=\"v\">50+ <span style=\"color:var(--ink-faint);font-size:14px;\">concurrent sessions<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"margin: 36px 0 16px;\">Root causes found<\u002Fh3>\n    <div class=\"causes\">\n      <div class=\"cause\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div>\n          <h4>The ETag guard was completely broken (silent no-op).<\u002Fh4>\n          <p>AO had code intended to skip the full GraphQL batch when nothing had changed (using HTTP 304 Not Modified). But <code>gh api -i<\u002Fcode> exits with code 1 on a 304, and the catch block was treating that as \"something changed\" — triggering a full GraphQL batch call every single poll cycle regardless. The optimization was doing the opposite of its intent.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cause\">\n        <div class=\"num\">02<\u002Fdiv>\n        <div>\n          <h4>Agents themselves were the bigger consumer.<\u002Fh4>\n          <p>When we ran 5 real Claude Code agents, they exhausted the GraphQL bucket in 31 minutes at ~9,572 pts/hr — <strong>37×<\u002Fstrong> more than AO's own polling. AO consumed only ~10 calls; agents were calling <code>gh<\u002Fcode> constantly through the <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper, which had no visibility or caching.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cause\">\n        <div class=\"num\">03<\u002Fdiv>\n        <div>\n          <h4>Two independent polling loops.<\u002Fh4>\n          <p>The CLI lifecycle manager and the web dashboard were each running their own independent GitHub API polling loops, doubling all traffic. The dashboard was also making individual REST calls for each session's PR data on top of that.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"margin: 36px 0 16px;\">The hard numbers (before)<\u002Fh3>\n    <p class=\"dim\" style=\"margin-bottom:18px;\">Extrapolation from 5-session runs showed the ceiling hit well before the 50-session target.<\u002Fp>\n\n    <table class=\"sessions-table\">\n      <thead>\n        <tr>\n          <th style=\"width: 20%;\">Sessions<\u002Fth>\n          <th style=\"width: 52%;\">GraphQL burn / hr<\u002Fth>\n          <th style=\"width: 28%;\">Status<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr class=\"gradient-row r-safe\">\n          <td>5<\u002Ftd>\n          <td><span>683 – 1,180<\u002Fspan><\u002Ftd>\n          <td><span class=\"status safe\">Safe<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr class=\"gradient-row r-edge\">\n          <td>20<\u002Ftd>\n          <td><span>2,733 – 4,720<\u002Fspan><\u002Ftd>\n          <td><span class=\"status edge\">At the edge<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr class=\"gradient-row r-over\">\n          <td>50<\u002Ftd>\n          <td><span>6,833 – 11,800<\u002Fspan><\u002Ftd>\n          <td><span class=\"status over\">Over budget<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"ceiling\">Practical ceiling with the bugs in place: <b>~20–35 sessions max.<\u002Fb><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HERO: BEFORE / AFTER ============ -->\n  <section>\n    <h2>The hard numbers (after)<\u002Fh2>\n\n    <div class=\"hero\">\n      <div class=\"hero-head\">\n        <div>\n          <h3>Before / After<\u002Fh3>\n          <p class=\"hero-sub\">Measured over 15-min windows; GraphQL / REST per hour.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"worst-case-note\">\n          <span class=\"wc-dot\"><\u002Fspan>\n          <span><b>Note:<\u002Fb> tested for worst-case scenario<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"metrics\">\n        <div class=\"col-head label\">Metric<\u002Fdiv>\n        <div class=\"col-head before\">Before<\u002Fdiv>\n        <div class=\"col-head after\">After<\u002Fdiv>\n        <div class=\"col-head delta\">Δ<\u002Fdiv>\n\n        <div class=\"cell label\">GraphQL pts / hr<\u002Fdiv>\n        <div class=\"cell before\">~2,072<\u002Fdiv>\n        <div class=\"cell after\">~604<\u002Fdiv>\n        <div class=\"cell delta\">−56%<\u002Fdiv>\n\n        <div class=\"cell label\">REST calls / hr<\u002Fdiv>\n        <div class=\"cell before\">~275<\u002Fdiv>\n        <div class=\"cell after\">~110<\u002Fdiv>\n        <div class=\"cell delta\">−60%<\u002Fdiv>\n\n        <div class=\"cell label\">Dashboard API calls / 15 min<\u002Fdiv>\n        <div class=\"cell before\">~150<\u002Fdiv>\n        <div class=\"cell after\">0<\u002Fdiv>\n        <div class=\"cell delta\">−100%<\u002Fdiv>\n\n        <div class=\"cell label\">Max sessions before exhaustion<\u002Fdiv>\n        <div class=\"cell before\">~12<\u002Fdiv>\n        <div class=\"cell after\">~41<\u002Fdiv>\n        <div class=\"cell delta up\">+242%<\u002Fdiv>\n\n        <div class=\"cell label\">Total calls / min<\u002Fdiv>\n        <div class=\"cell before\">31<\u002Fdiv>\n        <div class=\"cell after\">11<\u002Fdiv>\n        <div class=\"cell delta\">−65%<\u002Fdiv>\n\n        <div class=\"row-last\" style=\"display:contents;\">\n          <div class=\"cell label row-last\">Lifecycle managers<\u002Fdiv>\n          <div class=\"cell before row-last\">2<\u002Fdiv>\n          <div class=\"cell after row-last\">1<\u002Fdiv>\n          <div class=\"cell delta row-last\" style=\"color: var(--ink-dim); font-size: 14px;\">removed duplication<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"calc-box\">\n        <b>How max sessions is calculated:<\u002Fb> <code>5,000 pts/hr budget ÷ GraphQL pts/hr per session<\u002Fcode><br>\n        <span style=\"color: var(--good);\">After:<\u002Fspan> 604 ÷ 5 sessions = 120.8 pts/hr per session <span class=\"arrow\">→<\u002Fspan> 5,000 ÷ 120.8 = <b>~41 sessions<\u002Fb><br>\n        <span style=\"color: var(--bad);\">Before:<\u002Fspan> 2,072 ÷ 5 sessions = 414.4 pts/hr per session <span class=\"arrow\">→<\u002Fspan> 5,000 ÷ 414.4 = <b>~12 sessions<\u002Fb>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SUMMARY ============ -->\n  <section>\n    <h2>Summary<\u002Fh2>\n    <div class=\"card\">\n      <div class=\"summary\">\n        AO was hitting GitHub's 5,000 pts/hr GraphQL limit at just <strong>~12 concurrent sessions<\u002Fstrong>, making 50-session support impossible. The core bug was a broken ETag guard — <code>gh api -i<\u002Fcode> exits code 1 on HTTP 304, so the catch block assumed \"changed\" and fired a full GraphQL batch every poll cycle, making the optimization completely dead. On the AO side, we added in-process per-method TTL caches across <code class=\"pill-path\">scm-github<\u002Fcode> and <code class=\"pill-path\">tracker-github<\u002Fcode>, removed individual REST fallbacks from lifecycle polling, consolidated review comment fetching into a single GraphQL call, and removed an unused <code>reviews<\u002Fcode> field from every batch query. The biggest structural fix was <strong>shared enrichment<\u002Fstrong> — the CLI lifecycle manager now persists batch results to session metadata files, and the web dashboard reads from disk instead of making its own GitHub API calls, eliminating the duplicate polling loop entirely.\n        <br><br>\n        Final result: GraphQL down from ~2,072 to ~604 pts/hr (<strong>−56%<\u002Fstrong>), max supported sessions up from ~12 to ~41 (<strong>+242%<\u002Fstrong>), and dashboard API calls reduced to zero. Notably, a significant chunk of API consumption still comes from agents calling <code>gh<\u002Fcode> directly — this is currently uncontrolled since LLMs are non-deterministic. A promising next step would be modifying the agent prompt to instruct agents to use already-fetched PR/issue data passed in context rather than re-querying GitHub themselves.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MAJOR STEPS ============ -->\n  <section>\n    <h2>Major Steps<\u002Fh2>\n    <div class=\"steps\">\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Instrumented AO with <code class=\"pill-method\">execGhObserved()<\u002Fcode><\u002Fh4>\n        <p>Added JSONL tracing to all GitHub CLI calls to get baseline visibility on what was being called and how often.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Fixed the broken ETag guard<\u002Fh4>\n        <p><code>gh api -i<\u002Fcode> exits code 1 on HTTP 304; the catch block was treating this as \"changed\" and firing a full GraphQL batch every poll cycle. Fixed by detecting 304 in the error output before treating it as a real failure.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Added in-process caches to <code class=\"pill-path\">scm-github<\u002Fcode><\u002Fh4>\n        <p>Per-method TTLs (5s–60s) on all PR-related calls (<code class=\"pill-method\">detectPR<\u002Fcode>, <code class=\"pill-method\">resolvePR<\u002Fcode>, <code class=\"pill-method\">getPRState<\u002Fcode>, <code class=\"pill-method\">getCIChecks<\u002Fcode>, <code class=\"pill-method\">getMergeability<\u002Fcode>, <code class=\"pill-method\">getReviews<\u002Fcode>, <code class=\"pill-method\">getReviewDecision<\u002Fcode>, <code class=\"pill-method\">getPendingComments<\u002Fcode>).<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Added in-process cache to <code class=\"pill-path\">tracker-github<\u002Fcode><\u002Fh4>\n        <p>5-min TTL on issue reads, which were being called 64+ times per session.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Removed individual REST fallbacks from lifecycle polling<\u002Fh4>\n        <p><code class=\"pill-method\">determineStatus()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchCIFailureDetails()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchMergeConflicts()<\u002Fcode> no longer fall back to individual <code>gh pr view<\u002Fcode> / <code>gh pr checks<\u002Fcode> calls on batch miss.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Consolidated review comment fetching<\u002Fh4>\n        <p>Replaced the paginated REST <code class=\"pill-method\">getAutomatedComments()<\u002Fcode> call with a single GraphQL <code class=\"pill-method\">getReviewThreads()<\u002Fcode> call.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Removed unused <code>reviews(last: 5)<\u002Fcode> from the batch query<\u002Fh4>\n        <p>It was being fetched on every batch call but never consumed.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Shared enrichment + single lifecycle manager<\u002Fh4>\n        <p>CLI lifecycle manager persists batch enrichment to session metadata files; web dashboard reads from disk instead of calling GitHub. Eliminated the duplicate web polling loop entirely, reducing lifecycle managers from 2 to 1.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ARCHITECTURAL CACHES ============ -->\n  <section>\n    <h2>Architectural Caches<\u002Fh2>\n    <div class=\"cache-grid\">\n      <div class=\"cache-card\">\n        <h4><span class=\"n\">01<\u002Fspan> ETag guard (HTTP 304)<\u002Fh4>\n        <p>Before firing the full GraphQL batch, AO makes a cheap REST call with <code>If-None-Match<\u002Fcode>. If GitHub returns 304 (nothing changed), the batch is skipped entirely. Guard 1 covers PR list changes (<strong>62% hit rate<\u002Fstrong>), Guard 2 covers commit status changes (<strong>87% hit rate<\u002Fstrong>).<\u002Fp>\n        <p>The bug was this was completely broken — <code>gh<\u002Fcode> exits code 1 on 304 and the catch block assumed \"changed\" every time. Fixing it meant most poll cycles skip the batch entirely.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cache-card\">\n        <h4><span class=\"n\">02<\u002Fspan> Shared enrichment metadata (disk)<\u002Fh4>\n        <p>The lifecycle manager now persists the full batch result (<code>prEnrichment<\u002Fcode> + <code>prReviewComments<\u002Fcode>) to session metadata files on disk after every poll. The web dashboard reads from these files instead of calling GitHub itself.<\u002Fp>\n        <p><strong>Why:<\u002Fstrong> the dashboard and CLI were running two independent polling loops — both hitting GitHub for the same data. Removing the dashboard's loop and having it read from disk eliminated <strong>~54% of all duplicate traffic<\u002Fstrong> and brought dashboard API calls to zero.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cache-card\">\n        <h4><span class=\"n\">03<\u002Fspan> <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper cache (disk, per-session)<\u002Fh4>\n        <p>Every <code>gh<\u002Fcode> call agents make goes through this wrapper. It caches <code>gh pr list --head<\u002Fcode> with <strong>infinite TTL<\u002Fstrong> (branch→PR mapping is permanent once created) and <code>gh issue view<\u002Fcode> with <strong>300s TTL<\u002Fstrong> (agents kept re-fetching the same issue to remind themselves of the task).<\u002Fp>\n        <p><strong>Why:<\u002Fstrong> agent-side <code>gh<\u002Fcode> consumption was completely untracked and uncached — 5 real agents exhausted the entire GraphQL bucket in 31 minutes. This was the biggest surprise of the whole investigation.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CACHE TTL REFERENCE ============ -->\n  <section>\n    <h2>Cache TTL Reference<\u002Fh2>\n\n    <div class=\"ref-block\">\n      <div class=\"ref-title\">\n        <h4><code class=\"pill-path\">scm-github<\u002Fcode> — In-process per-instance cache<\u002Fh4>\n      <\u002Fdiv>\n      <p class=\"ref-sub\">Max 1,000 entries. Invalidated on mutations (<code class=\"pill-method\">mergePR<\u002Fcode>, <code class=\"pill-method\">closePR<\u002Fcode>, <code class=\"pill-method\">assignPRToCurrentUser<\u002Fcode>).<\u002Fp>\n      <table class=\"ref-table\">\n        <thead><tr><th>Method<\u002Fth><th>TTL<\u002Fth><th>What's cached<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code class=\"pill-method\">detectPR<\u002Fcode><\u002Ftd><td class=\"ttl\">30s<\u002Ftd><td>Branch → PR mapping<\u002Ftd><td>Positive-only. Never caches null (missing PR).<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">resolvePR<\u002Fcode><\u002Ftd><td class=\"ttl\">60s<\u002Ftd><td>PR identity metadata (number, url, title, branch refs, isDraft)<\u002Ftd><td>Stable for life of PR.<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getPRState<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>open / merged / closed<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getPRSummary<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>state + title + additions/deletions<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getCIChecks<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>CI check list (name, state, link, timestamps)<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getMergeability<\u002Fcode><\u002Ftd><td class=\"ttl\">5s<\u002Ftd><td>Composite merge readiness + blockers<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getReviews<\u002Fcode><\u002Ftd><td class=\"ttl\">10s<\u002Ftd><td>Review array (state, body, author)<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getReviewDecision<\u002Fcode><\u002Ftd><td class=\"ttl\">10s<\u002Ftd><td>approved / changes_requested / pending<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n          <tr><td><code class=\"pill-method\">getPendingComments<\u002Fcode><\u002Ftd><td class=\"ttl\">10s<\u002Ftd><td>Unresolved review threads (GraphQL)<\u002Ftd><td>Also shared by <code class=\"pill-method\">getReviewThreads<\u002Fcode> (same cache key).<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"ref-block\">\n      <div class=\"ref-title\">\n        <h4><code class=\"pill-path\">tracker-github<\u002Fcode> — In-process per-instance cache<\u002Fh4>\n      <\u002Fdiv>\n      <p class=\"ref-sub\">Max 500 entries. Invalidated on mutations (<code class=\"pill-method\">updateIssue<\u002Fcode>).<\u002Fp>\n      <table class=\"ref-table\">\n        <thead><tr><th>Method<\u002Fth><th>TTL<\u002Fth><th>What's cached<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code class=\"pill-method\">getIssue<\u002Fcode><\u002Ftd><td class=\"ttl\">5 min<\u002Ftd><td>Issue metadata (title, body, state, labels, assignees)<\u002Ftd><td><code class=\"pill-method\">isCompleted<\u002Fcode> routes through this.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"ref-block\">\n      <div class=\"ref-title\">\n        <h4><code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper — Agent-side bash cache (disk, per-session)<\u002Fh4>\n      <\u002Fdiv>\n      <p class=\"ref-sub\">Stored in <code class=\"pill-path\">$AO_DATA_DIR/.ghcache/$AO_SESSION/<\u002Fcode>. Cache key includes <code>--json<\u002Fcode> fields.<\u002Fp>\n      <table class=\"ref-table\">\n        <thead><tr><th>Command<\u002Fth><th>TTL<\u002Fth><th>What's cached<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><code>gh pr list --head &lt;branch&gt; --limit 1<\u002Fcode><\u002Ftd><td class=\"ttl\">Infinite<\u002Ftd><td>Branch → PR JSON<\u002Ftd><td>Positive-only. Never caches empty <code>[]<\u002Fcode>.<\u002Ftd><\u002Ftr>\n          <tr><td><code>gh issue view &lt;N&gt;<\u002Fcode><\u002Ftd><td class=\"ttl\">300s<\u002Ftd><td>Issue JSON response<\u002Ftd><td>Any successful response cached.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TRADEOFFS ============ -->\n  <section>\n    <h2>Tradeoffs<\u002Fh2>\n    <div class=\"steps trade\">\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Cache TTLs vs data freshness<\u002Fh4>\n        <p>Tightest TTLs (5s) on fast-changing fields (CI state, mergeability, PR state), looser (10s–30s) on slower-changing ones (reviews, <code class=\"pill-method\">detectPR<\u002Fcode>). Lifecycle could act on data that's a few seconds stale. Accepted because 5s is well under one poll cycle.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Positive-only caching for <code class=\"pill-method\">detectPR<\u002Fcode><\u002Fh4>\n        <p>Never cache a null (no PR found). A just-created PR must surface on the next poll, so we pay the <code>gh<\u002Fcode> call cost on every miss. Tradeoff: cache is only useful after PR creation, not before.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Batch miss → wait for next cycle<\u002Fh4>\n        <p>Removed individual REST fallbacks entirely. If the batch fails, lifecycle waits for the next poll rather than fetching fresh data immediately. In practice the batch query never fails, so this only adds up to 30s latency in the rare failure case while eliminating <strong>~12 individual API calls per poll cycle<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Dashboard reads from disk, not live API<\u002Fh4>\n        <p>Dashboard freshness is now tied to the lifecycle poll interval (30s) instead of being real-time. Tradeoff: slightly stale dashboard in exchange for zero GitHub API calls from the web process. If a PR gets merged or CI fails, the dashboard won't reflect it until the next lifecycle poll writes fresh metadata (up to 30s delay).<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Reverted PR-scoped ETag guards<\u002Fh4>\n        <p>Added per-PR ETag checks instead of per-repo, but this increased REST calls (1 per PR vs 1 per repo) without meaningful GraphQL savings. Reverted when traces showed REST delta went <strong>16 → 142<\u002Fstrong> while GraphQL stayed flat.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FUTURE SCOPE ============ -->\n  <section>\n    <h2>Future Scope<\u002Fh2>\n    <div class=\"steps future\">\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Review thread throttle (2 min → 5 min)<\u002Fh4>\n        <p>Review threads are currently fetched via GraphQL every 2 minutes per session. Loosening this to 5 minutes would cut review thread calls by <strong>~60%<\u002Fstrong> with no meaningful impact — humans don't leave review comments faster than every few minutes in practice.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"badge\"><\u002Fdiv><div>\n        <h4>Agent prompt modification<\u002Fh4>\n        <p>A significant chunk of API consumption comes from agents re-querying GitHub for data AO already has (PR state, issue context, CI status). Since AO fetches and persists all this to session metadata, we can inject it directly into the agent's prompt at spawn and on each reaction. This would instruct the agent to use the provided context instead of calling <code>gh<\u002Fcode> itself, reducing non-deterministic agent-side API consumption without needing to control the LLM's behavior.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ DETAILED CHANGELOG (COLLAPSIBLE) ============ -->\n  <section>\n    <h2>Detailed Changelog<\u002Fh2>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">A<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Tracer Infrastructure<\u002Fdiv>\n            <div class=\"t-date\">Apr 14 – 16<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>Added <code class=\"pill-method\">execGhObserved()<\u002Fcode><\u002Fstrong> — JSONL tracing for all AO-side GitHub CLI calls, writing to <code class=\"pill-path\">$AO_GH_TRACE_FILE<\u002Fcode><\u002Fli>\n          <li><strong>Migrated <code class=\"pill-path\">scm-github<\u002Fcode> and <code class=\"pill-path\">tracker-github<\u002Fcode> call sites<\u002Fstrong> to use <code class=\"pill-method\">execGhObserved()<\u002Fcode><\u002Fli>\n          <li><strong>Fixed operation naming<\u002Fstrong> — <code class=\"pill-method\">extractOperation()<\u002Fcode> was mis-bucketing REST calls by not skipping dash-prefixed flags<\u002Fli>\n          <li><strong>Added <code>-i<\u002Fcode> flag to <code class=\"pill-method\">executeBatchQuery<\u002Fcode><\u002Fstrong> — required for ETag/304 response headers<\u002Fli>\n          <li><strong>Added per-reset-window burn segmentation<\u002Fstrong> to trace analyzers (<code class=\"pill-path\">analyze-trace.mjs<\u002Fcode>, <code class=\"pill-path\">drill-tracer.mjs<\u002Fcode>)<\u002Fli>\n          <li><strong>Fixed mocked <code class=\"pill-method\">execFile<\u002Fcode> path regressions<\u002Fstrong> — guarded stderr/stdout against undefined; bounded operation cardinality by taking only first REST URL path segment<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">B<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">ETag Guard Bug Fix<\u002Fdiv>\n            <div class=\"t-date\">Apr 16 – 17<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li>\n            <strong>Fixed the core ETag 304 bug<\u002Fstrong> — <code>gh api -i<\u002Fcode> exits with code 1 on HTTP 304. The catch block was returning <code>true<\u002Fcode> (assumed \"changed\"), firing a full GraphQL batch every poll cycle. Fix: detect 304 in the error's stdout/stderr before treating it as a real error. Unified regex for HTTP/1.1, HTTP/2, HTTP/2.0.\n            <div class=\"result\">Result: 100% ETag 304 hit rate, 0 GraphQL batch calls in steady state, 5% GraphQL budget at 5 sessions.<\u002Fdiv>\n          <\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">C<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Agent-Side Consumption<\u002Fdiv>\n            <div class=\"t-date\">Apr 18 – 22<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>Patched <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> wrapper with invocation logging<\u002Fstrong> — every <code>gh<\u002Fcode> call from agents logged to a JSONL trace<\u002Fli>\n          <li><strong>Fixed dash-prefixed args in wrapper logging<\u002Fstrong> — <code>gh --version<\u002Fcode> was being mangled<\u002Fli>\n          <li><strong>Analyzed agent-side waste<\u002Fstrong> — <code>gh pr list --head<\u002Fcode> was 65% of all agent-side wrapper calls; each branch queried 36–75× identically<\u002Fli>\n          <li>\n            <strong>Added wrapper read-through cache:<\u002Fstrong>\n            <ul class=\"sub\">\n              <li><code>gh pr list --head<\u002Fcode>: infinite TTL for positive results (598 → ~10 calls, <strong>98% reduction<\u002Fstrong>)<\u002Fli>\n              <li><code>gh issue view<\u002Fcode>: 300s TTL (75 → ~20 calls, <strong>73% reduction<\u002Fstrong>)<\u002Fli>\n            <\u002Ful>\n          <\u002Fli>\n          <li><strong>Lifted PATH wrapper installation into session-manager universally<\u002Fstrong> — removed per-agent-plugin duplication<\u002Fli>\n          <li><strong>Added cache-hit/miss tracing to wrapper<\u002Fstrong> — <code>cacheResult<\u002Fcode> field: hit/miss-stored/miss-negative/miss-error; added <code>operation<\u002Fcode>, <code>durationMs<\u002Fcode>, <code>exitCode<\u002Fcode>, <code>ok<\u002Fcode> fields to trace<\u002Fli>\n          <li><strong>Fixed <code class=\"pill-method\">execGhObserved()<\u002Fcode> resolving to the wrapper<\u002Fstrong> — it was calling <code class=\"pill-path\">~/.ao/bin/gh<\u002Fcode> (the wrapper) instead of the real <code>gh<\u002Fcode> binary, causing AO traces to pollute agent traces and cache to silently fail. Fixed by stripping <code class=\"pill-path\">~/.ao/bin<\u002Fcode> from PATH at startup<\u002Fli>\n          <li><strong>Fixed critical macOS PATH bug<\u002Fstrong> — macOS zsh <code class=\"pill-method\">path_helper<\u002Fcode> resets PATH during shell init in tmux sessions, wiping <code class=\"pill-path\">~/.ao/bin<\u002Fcode>. The wrapper was never active on macOS. Fix: write <code>export PATH=...<\u002Fcode> into a launch script (initial <code>send-keys<\u002Fcode> approach sent 1000+ keystrokes and broke terminal input buffers)<\u002Fli>\n          <li><strong>Hardened wrapper cache correctness<\u002Fstrong> — cache key now includes <code>--json<\u002Fcode> fields; only caches stdout; fixed trailing newline; supports <code>--key=value<\u002Fcode> syntax; logs <code>miss-write-failed<\u002Fcode><\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">D<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">AO-Side Cache + Consolidation<\u002Fdiv>\n            <div class=\"t-date\">Apr 22<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li>\n            <strong>Added in-process per-instance cache to <code class=\"pill-path\">scm-github<\u002Fcode><\u002Fstrong> with per-method TTLs:\n            <ul class=\"sub\">\n              <li><code class=\"pill-method\">resolvePR<\u002Fcode>: 60s<\u002Fli>\n              <li><code class=\"pill-method\">getPRState<\u002Fcode>, <code class=\"pill-method\">getPRSummary<\u002Fcode>, <code class=\"pill-method\">getReviews<\u002Fcode>, <code class=\"pill-method\">getReviewDecision<\u002Fcode>: 5s<\u002Fli>\n              <li><code class=\"pill-method\">getCIChecks<\u002Fcode>, <code class=\"pill-method\">getMergeability<\u002Fcode>, <code class=\"pill-method\">getPendingComments<\u002Fcode>: 5s<\u002Fli>\n              <li><code class=\"pill-method\">detectPR<\u002Fcode>: 5s positive-only<\u002Fli>\n              <li>Mutation methods invalidate cache<\u002Fli>\n              <li>Tuned TTLs via cache-replay: <code class=\"pill-method\">detectPR<\u002Fcode> 5s→30s, <code class=\"pill-method\">getReviewDecision<\u002Fcode> 5s→10s, <code class=\"pill-method\">getPendingComments<\u002Fcode> 5s→10s<\u002Fli>\n            <\u002Ful>\n          <\u002Fli>\n          <li><strong>Added in-process issue cache to <code class=\"pill-path\">tracker-github<\u002Fcode><\u002Fstrong> — <code>Map&lt;string, CachedIssue&gt;<\u002Fcode>, 5-min TTL, bounded to 500 entries (LRU evict-oldest). <code class=\"pill-method\">isCompleted<\u002Fcode> routed through <code class=\"pill-method\">getIssue<\u002Fcode>. ~744 → ~15 <code>gh issue view<\u002Fcode> calls per run<\u002Fli>\n          <li><strong>Removed individual REST fallbacks from lifecycle polling<\u002Fstrong> — <code class=\"pill-method\">determineStatus()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchCIFailureDetails()<\u002Fcode>, <code class=\"pill-method\">maybeDispatchMergeConflicts()<\u002Fcode> no longer fall back to individual <code>gh pr view<\u002Fcode>/<code>gh pr checks<\u002Fcode> on batch cache miss. Eliminated ~110 calls per 15-min window (<strong>24% of AO-side traffic<\u002Fstrong>)<\u002Fli>\n          <li><strong>Consolidated review comment fetching into single GraphQL call<\u002Fstrong> — added <code class=\"pill-method\">getReviewThreads()<\u002Fcode> to SCM interface. Eliminated <code class=\"pill-method\">getAutomatedComments()<\u002Fcode> REST call (~40 calls/15 min)<\u002Fli>\n          <li><strong>Removed unused <code>reviews(last: 5)<\u002Fcode> from batch query<\u002Fstrong> — it was fetched but never consumed, wasting GraphQL complexity on every batch call<\u002Fli>\n          <li><strong>Reverted PR-scoped ETag guards<\u002Fstrong> — per-PR ETag added more REST calls (1 per PR vs 1 per repo) without meaningful GraphQL savings; core REST delta went 16→142 while GraphQL stayed flat<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"track\">\n      <summary>\n        <div class=\"t-left\">\n          <div class=\"letter\">E<\u002Fdiv>\n          <div>\n            <div class=\"t-title\">Shared Enrichment Architecture<\u002Fdiv>\n            <div class=\"t-date\">Apr 22 – 23<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"caret\"><\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"body\">\n        <ol>\n          <li><strong>CLI lifecycle manager now persists batch enrichment to session metadata<\u002Fstrong> — <code>prEnrichment<\u002Fcode> and <code>prReviewComments<\u002Fcode> keys written after each poll cycle<\u002Fli>\n          <li><strong>Web dashboard reads metadata instead of calling GitHub API<\u002Fstrong> — <code class=\"pill-path\">serialize.ts<\u002Fcode> reads enrichment from disk. Dashboard freshness improved from <strong>5 min → 30s<\u002Fstrong> (tied to lifecycle poll)<\u002Fli>\n          <li><strong>Removed web dashboard's duplicate lifecycle manager<\u002Fstrong> — eliminated the second independent polling loop that was the source of ~54% of remaining duplicate traffic. Dashboard API calls: <strong>~150/15 min → 0<\u002Fstrong><\u002Fli>\n          <li><strong>Fixed <code class=\"pill-method\">storageKey<\u002Fcode> usage in <code class=\"pill-method\">persistPREnrichmentToMetadata<\u002Fcode><\u002Fstrong> — was using wrong key for <code class=\"pill-method\">getSessionsDir<\u002Fcode><\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
